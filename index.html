<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healtrack</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3a4163">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Healtrack">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://HEALTRACK_SUPABASE_URL_PLACEHOLDER.supabase.co" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://HEALTRACK_SUPABASE_URL_PLACEHOLDER.supabase.co">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* ── BRAND FISIOVIDA ── */
      --bg:           #F2F4F7;
      --surface:      #FFFFFF;
      --surface-2:    #EAECf0;

      /* Azul vibrante da logo */
      --primary:      #4fa0d4;
      --primary-lt:   #ddf0fa;
      --primary-dk:   #3a4163;
      --primary-md:   #2e7db8;

      /* Verde da logo */
      --accent:       #95bb29;
      --accent-lt:    #eef5d4;
      --accent-dk:    #7a9a1e;
      --accent-md:    #82a522;

      /* Complementares */
      --blue-lt:      #99d0e9;
      --yellow-lt:    #d4e08a;

      /* Gradiente da logo (azul → verde) */
      --grad:         linear-gradient(135deg, #3a4163 0%, #4fa0d4 60%, #95bb29 100%);
      --grad-h:       linear-gradient(135deg, #4fa0d4, #95bb29);
      --grad-btn:     linear-gradient(135deg, #4fa0d4, #2e7db8);

      --f1:#E04545; --f1-bg:#FDEAEA;
      --f2:#D4860A; --f2-bg:#FEF3E2;
      --f3:#95bb29; --f3-bg:#eef5d4;

      --txt:#1A1D2E; --txt2:#4A5568; --txt3:#9AA5B4;
      --border:#DDE2EA; --bord2:#C8D0DC;

      --r:14px; --r-sm:8px; --r-lg:20px;
      --sh:0 2px 12px rgba(58,65,99,.08),0 1px 4px rgba(0,0,0,.04);
      --sh-md:0 6px 24px rgba(58,65,99,.14);
      --sh-lg:0 12px 48px rgba(58,65,99,.18);
      --sw:264px;
    }
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
    #app{height:100%;display:flex;flex-direction:column;}
    html,body{overflow-x:hidden;max-width:100%;}
    .layout{display:flex;height:100%;max-width:100%;overflow-x:hidden;}
    .main{max-width:100%;overflow-x:hidden;}

    /* ── SIDEBAR ── */
    .sidebar{width:var(--sw);background:linear-gradient(180deg,#2a3057 0%,#3a4163 40%,#2d6fa0 100%);display:flex;flex-direction:column;flex-shrink:0;position:fixed;left:0;top:0;bottom:0;height:100vh;z-index:160;transform:translateX(-100%);transition:transform .25s;overflow:hidden;}
    .sidebar::after{content:'';position:absolute;bottom:-80px;right:-80px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.03);pointer-events:none;}
    .sb-logo{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px;}
    .sb-logo-icon{width:36px;height:36px;flex-shrink:0;}
    .sb-logo h1{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;letter-spacing:-.3px;line-height:1.1;}
    .sb-logo span{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.5px;text-transform:uppercase;font-weight:500;display:block;margin-top:1px;}
    .sb-nav{padding:14px 10px;flex:1;display:flex;flex-direction:column;gap:2px;}
    .nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;color:rgba(255,255,255,.6);font-size:14px;font-weight:500;transition:background-color .15s,border-color .15s,box-shadow .15s,transform .15s,color .15s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
    .nav-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9);}
    .nav-btn.active{background:rgba(255,255,255,.12);color:#fff;}
    .nav-badge{margin-left:auto;background:linear-gradient(135deg,#95bb29,#7a9a1e);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;min-width:20px;text-align:center;box-shadow:0 2px 6px rgba(149,187,41,.4);}
    .sb-foot{padding:10px 10px 14px;border-top:1px solid rgba(255,255,255,.08);}
    .u-card{display:flex;align-items:center;gap:10px;padding:8px 12px;}
    .u-av{width:32px;height:32px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:12px;color:#fff;flex-shrink:0;}
    .u-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .u-role{font-size:11px;color:rgba(255,255,255,.4);}
    .nav-btn-cfg{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:var(--r-sm);cursor:pointer;color:rgba(255,255,255,.35);font-size:12px;font-weight:400;transition:background-color .15s,border-color .15s,box-shadow .15s,transform .15s,color .15s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;margin-top:2px;}
    .nav-btn-cfg:hover{color:rgba(255,255,255,.65);background:rgba(255,255,255,.05);}
    .nav-btn-cfg.cfg-active{color:rgba(255,255,255,.75);}
    .btn-sair{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--r-sm);cursor:pointer;color:rgba(255,255,255,.25);font-size:11px;transition:background-color .15s,border-color .15s,box-shadow .15s,transform .15s,color .15s;border:none;background:none;width:100%;font-family:'DM Sans',sans-serif;}
    .btn-sair:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);}

    /* ── MAIN ── */
    .main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
    .ph{padding:28px 32px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
    .ph-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--primary-dk);letter-spacing:-.5px;}
    .ph-sub{font-size:14px;color:var(--txt2);margin-top:4px;}
    .pc{padding:24px 32px 48px;flex:1;}

    /* ── BUTTONS ── */
    .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r-sm);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:background-color .15s,border-color .15s,box-shadow .15s,transform .15s,color .15s;white-space:nowrap;}
    .btn-p{background:var(--grad-btn);color:#fff;border:none;}
    .btn-p:hover{background:linear-gradient(135deg,#3a4163,#2e7db8);transform:translateY(-1px);box-shadow:0 6px 18px rgba(79,160,212,.4);}
    .btn-acc{background:linear-gradient(135deg,#95bb29,#7a9a1e);color:#fff;}
    .btn-acc:hover{background:var(--accent-dk);transform:translateY(-1px);box-shadow:0 4px 12px rgba(149,187,41,.3);}
    .btn-s{background:var(--surface);color:var(--txt);border:1.5px solid var(--border);}
    .btn-s:hover{border-color:var(--bord2);background:var(--surface-2);}
    .btn-g{background:transparent;color:var(--txt2);}
    .btn-g:hover{background:var(--surface-2);}
    .btn-sm{padding:6px 12px;font-size:13px;}
    .btn-lg{padding:12px 24px;font-size:15px;}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}

    /* ── CARDS ── */
    .card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:20px;box-shadow:var(--sh);}
    .card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .card-t{font-size:15px;font-weight:600;color:var(--txt);}

    /* ── FORMS ── */
    .fg{margin-bottom:16px;}
    .fl{display:block;font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:6px;}
    .fi,.fta,.fsel{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--txt);background:var(--surface);transition:border-color .15s,box-shadow .15s;outline:none;}
    .fi:focus,.fta:focus,.fsel:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,160,212,.18);}
    .fta{resize:vertical;min-height:90px;}
    .fg2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}

    /* ── BADGES ── */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.2px;}
    .b-f1{background:#FEE2E2;color:#C53030;}
    .b-f2{background:#FEF3CD;color:#92400E;}
    .b-f3{background:var(--accent-lt);color:var(--accent-dk);}
    .b-n{background:var(--surface-2);color:var(--txt2);}
    .b-p{background:var(--primary-lt);color:var(--primary-md);border:1px solid rgba(79,160,212,.2);}
    .b-acc{background:var(--accent-lt);color:var(--accent-dk);border:1px solid rgba(149,187,41,.25);}

    /* ── LOGIN ── */
    .login-pg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;position:relative;overflow:hidden;}
    .login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 900px 700px at 70% 20%,rgba(79,160,212,.12) 0%,transparent 65%),radial-gradient(ellipse 600px 500px at 20% 80%,rgba(149,187,41,.1) 0%,transparent 65%),radial-gradient(ellipse 400px 400px at 50% 50%,rgba(58,65,99,.05) 0%,transparent 70%);}
    .login-card{background:var(--surface);border-radius:var(--r-lg);padding:48px 44px;width:100%;max-width:420px;box-shadow:var(--sh-lg);border:1px solid var(--border);position:relative;z-index:1;}
    .login-logo{text-align:center;margin-bottom:36px;}
    .login-logo h1{font-family:'DM Serif Display',serif;font-size:38px;background:var(--grad-h);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;}
    .login-logo p{font-size:12px;color:var(--txt3);margin-top:4px;letter-spacing:1.2px;text-transform:uppercase;font-weight:500;}
    .login-err{background:#FEF2F2;border:1px solid #FECACA;color:#DC2626;padding:10px 14px;border-radius:var(--r-sm);font-size:13px;margin-bottom:16px;display:none;}

    /* ── PATIENTS GRID ── */
    .search-bar{position:relative;margin-bottom:20px;}
    .search-bar input{width:100%;padding:11px 16px 11px 44px;border:1.5px solid var(--border);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;background:var(--surface);color:var(--txt);outline:none;transition:border-color .15s;}
    .search-bar input:focus{border-color:var(--primary);}
    .search-ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:18px;}
    .pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
    .pac-card{background:var(--surface);border-radius:var(--r);padding:20px;border:1.5px solid var(--border);box-shadow:var(--sh);cursor:pointer;transition:background-color .2s,border-color .2s,box-shadow .2s,transform .2s,color .2s;display:flex;flex-direction:column;gap:14px;}
    .pac-card:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 8px 28px rgba(79,160,212,.2);}
    .pac-card-hd{display:flex;align-items:center;gap:12px;}
    .pac-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary-lt),var(--accent-lt));display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:17px;color:var(--primary-dk);flex-shrink:0;overflow:hidden;}
    .pac-av img{width:100%;height:100%;object-fit:cover;}
    .pac-nm{font-size:15px;font-weight:600;color:var(--txt);}
    .pac-info{font-size:12px;color:var(--txt2);margin-top:1px;}
    .pac-ft{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border);}
    .prog-lbl{font-size:11px;color:var(--txt3);font-weight:500;margin-bottom:4px;}
    .prog-bar{width:120px;height:5px;background:var(--surface-2);border-radius:10px;overflow:hidden;}
    .prog-fill{height:100%;background:var(--grad-h);border-radius:10px;transition:width .4s;box-shadow:0 1px 4px rgba(149,187,41,.3);}

    /* ── PATIENT HERO ── */
    .p-hero{background:var(--surface);border-radius:var(--r-lg);padding:24px 28px;border:1px solid var(--border);box-shadow:var(--sh);display:flex;align-items:flex-start;gap:20px;margin-bottom:20px;}
    .p-hero-av{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--primary-lt),var(--accent-lt));display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:26px;color:var(--primary-dk);flex-shrink:0;overflow:hidden;border:3px solid var(--primary);}
    .p-hero-av img{width:100%;height:100%;object-fit:cover;}
    .p-hero-nm{font-family:'DM Serif Display',serif;font-size:24px;color:var(--txt);letter-spacing:-.3px;}
    .p-hero-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;}
    .meta-it{font-size:13px;color:var(--txt2);}
    .p-hero-r{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
    .pdf-btns{display:flex;gap:6px;}

    /* ── PACOTE BAR ── */
    .pk-bar{background:linear-gradient(135deg,var(--primary-lt) 0%,var(--accent-lt) 100%);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:18px;border:1px solid rgba(79,160,212,.2);}
    .pk-info{flex:1;}
    .pk-label{font-size:12px;font-weight:600;color:var(--txt2);}
    .pk-count{font-family:'DM Serif Display',serif;font-size:20px;color:var(--txt);}
    .pk-prog{flex:2;height:8px;background:var(--border);border-radius:10px;overflow:hidden;}
    .pk-fill{height:100%;background:var(--grad-h);border-radius:10px;transition:width .6s;box-shadow:0 2px 6px rgba(79,160,212,.25);}

    /* ── TABS ── */
    .tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:24px;}
    .tab{padding:10px 20px;font-size:14px;font-weight:500;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:background-color .15s,border-color .15s,box-shadow .15s,transform .15s,color .15s;}
    .tab:hover{color:var(--txt);}
    .tab.active{color:var(--accent-dk);border-bottom-color:var(--accent);border-bottom-width:3px;font-weight:700;}

    /* ── TIMELINE ── */
    .timeline{position:relative;padding-left:40px;}
    .timeline::before{content:'';position:absolute;left:15px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,var(--f1),var(--primary),var(--accent));opacity:.5;border-radius:2px;}
    .tl-phase{display:flex;align-items:center;gap:10px;margin:24px 0 12px;position:relative;}
    .tl-phase:first-child{margin-top:0;}
    .tl-phase-dot{position:absolute;left:-31px;width:12px;height:12px;border-radius:50%;}
    .tl-item{position:relative;margin-bottom:14px;}
    .tl-dot{position:absolute;left:-32px;top:16px;width:10px;height:10px;border-radius:50%;border:2px solid var(--surface);}
    .tl-dot-f1{background:var(--f1);box-shadow:0 0 0 2px var(--f1);}
    .tl-dot-f2{background:var(--f2);box-shadow:0 0 0 2px var(--f2);}
    .tl-dot-f3{background:var(--accent);box-shadow:0 0 0 2px var(--accent);}
    .tl-card{background:var(--surface);border-radius:var(--r);padding:14px 16px;border:1.5px solid var(--border);box-shadow:var(--sh);cursor:pointer;transition:background-color .2s,border-color .2s,box-shadow .2s,transform .2s,color .2s;}
    .tl-card:hover{border-color:var(--primary);transform:translateX(4px);box-shadow:0 4px 16px rgba(79,160,212,.18);}
    .tl-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .tl-card-t{font-size:14px;font-weight:600;color:var(--txt);}
    .tl-card-d{font-size:12px;color:var(--txt3);}
    .tl-procs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
    .proc-tag{background:linear-gradient(135deg,var(--primary-lt),var(--accent-lt));color:var(--primary-dk);padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid rgba(79,160,212,.15);}
    .tl-photos{display:flex;gap:6px;overflow-x:auto;margin-top:8px;}
    .tl-photo{width:52px;height:52px;border-radius:7px;object-fit:cover;border:1.5px solid var(--border);flex-shrink:0;}
    .tl-empty{text-align:center;padding:56px 24px;background:var(--surface);border-radius:var(--r);border:2px dashed var(--border);}

    /* ── PROC GRID ── */
    .proc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-top:8px;}
    .proc-check{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--r-sm);border:1.5px solid var(--border);cursor:pointer;transition:background-color .15s,border-color .15s,box-shadow .15s,transform .15s,color .15s;font-size:13px;font-weight:500;color:var(--txt2);user-select:none;}
    .proc-check input{display:none;}
    .proc-check:has(input:checked){background:var(--accent-lt);border-color:var(--accent);color:var(--accent-dk);}
    .proc-chk-dot{width:16px;height:16px;border-radius:4px;border:2px solid var(--bord2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background-color .15s,border-color .15s,box-shadow .15s,transform .15s,color .15s;}
    .proc-check:has(input:checked) .proc-chk-dot{background:var(--accent);border-color:var(--accent);}

    /* ── PHOTO UPLOAD ── */
    .photo-drop{border:2px dashed var(--border);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:background-color .15s,border-color .15s,box-shadow .15s,transform .15s,color .15s;background:var(--surface-2);}
    .photo-drop:hover,.photo-drop.drag{border-color:var(--primary);background:var(--primary-lt);}
    .photos-prev{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;margin-top:12px;}
    .ph-prev{position:relative;aspect-ratio:1;}
    .ph-prev img{width:100%;height:100%;object-fit:cover;border-radius:var(--r-sm);border:1.5px solid var(--border);}
    .ph-rm{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(0,0,0,.65);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:#fff;border:none;}

    /* ── AI BOX ── */
    .ai-box{background:var(--grad);border-radius:var(--r);padding:22px;color:#fff;margin-top:16px;box-shadow:0 6px 24px rgba(58,65,99,.2);}
    .ai-box-hd{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;}
    .ai-box-t{font-size:14px;font-weight:600;}
    .ai-box-s{font-size:12px;opacity:.7;margin-top:2px;}
    .ai-result{background:rgba(255,255,255,.1);border-radius:var(--r-sm);padding:14px;font-size:13px;line-height:1.65;margin-top:14px;white-space:pre-wrap;max-height:320px;overflow-y:auto;}
    .ai-loading{display:flex;align-items:center;gap:8px;font-size:13px;opacity:.8;margin-top:14px;}
    .ai-spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}

    /* ── AGENDA ── */
    .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .cal-month{font-family:'DM Serif Display',serif;font-size:22px;color:var(--txt);letter-spacing:-.3px;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
    .cal-dow{font-size:11px;font-weight:700;color:var(--txt3);text-align:center;padding:8px 0;text-transform:uppercase;letter-spacing:.5px;}
    .cal-day{min-height:80px;padding:6px;border-radius:var(--r-sm);border:1px solid transparent;cursor:pointer;transition:background-color .15s,border-color .15s,box-shadow .15s,transform .15s,color .15s;position:relative;}
    .cal-day:hover{background:var(--surface-2);border-color:var(--border);}
    .cal-day.today{background:var(--accent-lt);border-color:var(--accent);}
    .cal-day.other-month{opacity:.35;}
    .cal-day.selected{background:var(--primary-lt);border-color:var(--primary);}

// ═══ ANTI-CACHE: se houver Service Worker controlando a pagina, mata e recarrega UMA vez ═══
(function(){
  try{
    if('serviceWorker' in navigator && navigator.serviceWorker.controller){
      if(!sessionStorage.getItem('_fv_swkill')){
        sessionStorage.setItem('_fv_swkill','1');
        navigator.serviceWorker.getRegistrations().then(function(rs){
          return Promise.all(rs.map(function(r){return r.unregister();}));
        }).then(function(){
          if(window.caches && caches.keys){
            return caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k);}));});
          }
        }).then(function(){ location.reload(); });
      }
    }
  }catch(e){}
})();

function calcFase(dataCir,refDate=null){
  if(!dataCir)return null;
  const dias=Math.floor(((refDate?new Date(refDate):Date.now())-new Date(dataCir))/86400000);
  if(dias<0)return null;
  if(dias<=5)return{nome:'Fase Inflamatória',cls:'f1',dias};
  if(dias<=21)return{nome:'Fase Proliferativa',cls:'f2',dias};
  return{nome:'Fase de Remodelamento',cls:'f3',dias};
}

async function compImg(file,maxW=1200,q2=0.8){
  return new Promise(res=>{
    const c=document.createElement('canvas'),img=new Image();
    img.onload=()=>{const r=Math.min(maxW/img.width,maxW/img.height,1);c.width=img.width*r;c.height=img.height*r;c.getContext('2d').drawImage(img,0,0,c.width,c.height);c.toBlob(b=>res(b||file),'image/jpeg',q2);};
    img.onerror=()=>res(file);img.src=URL.createObjectURL(file);
  });
}
async function img64(file,maxW=800){
  return new Promise(res=>{
    const c=document.createElement('canvas'),img=new Image();
    img.onload=()=>{const r=Math.min(maxW/img.width,maxW/img.height,1);c.width=img.width*r;c.height=img.height*r;c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',0.75).split(',')[1]);};
    img.src=URL.createObjectURL(file);
  });
}

// ── PIN HASH (SHA-256 browser) ──
async function hashPIN(pin){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin+'healtrack_salt_2024'));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function modalPIN(prof,onSuccess){
  let digits='';
  const o=modal(`<div class="mo-box" style="max-width:360px;text-align:center">
    <div class="mo-hd" style="justify-content:center"><div class="mo-t">PIN — ${prof.nome.split(' ')[0]}</div></div>
    <p style="font-size:13px;color:var(--txt3);margin-bottom:16px">Digite o PIN de 4 dígitos</p>
    <div class="pin-dots">${[0,1,2,3].map(i=>`<div class="pin-dot" id="pd${i}"></div>`).join('')}</div>
    <div class="pin-error" id="pin-err"></div>
    <div class="pin-pad" style="margin-top:12px">
      ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>`<button class="pin-btn" data-k="${k}" ${k===''?'style="visibility:hidden"':''}>${k}</button>`).join('')}
    </div>
    <button class="btn btn-g btn-sm" style="margin-top:16px" onclick="closeMo()">Cancelar</button>
  </div>`);
  const update=()=>{[0,1,2,3].forEach(i=>{const el=document.getElementById('pd'+i);if(el)el.classList.toggle('filled',i<digits.length);});};
  document.querySelectorAll('.pin-btn').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const k=btn.dataset.k;
      if(k==='⌫'){digits=digits.slice(0,-1);}
      else if(k!==''&&digits.length<4){digits+=k;}
      update();
      if(digits.length===4){
        const h=await hashPIN(digits);
        if(h===prof.pin_hash){
          S.profAtual=prof;
          sessionStorage.setItem('profAtual',JSON.stringify(prof));
          closeMo();onSuccess();
        } else {
          document.getElementById('pin-err').textContent='PIN incorreto';
          digits='';update();
        }
      }
    });
  });
}

// ── GRÁFICO EVOLUÇÃO IA ──
async function gerarEvolucaoIA(){
  const pk=S.pac?.pacotes?.find(p=>p.status==='ativo');
  const sessoes=(pk?.sessoes||[]).filter(s=>s.avaliacao_ia?.resultado).sort((a,b)=>new Date(a.data_sessao)-new Date(b.data_sessao));
  if(sessoes.length<2){toast('Necessário pelo menos 2 sessões com avaliação IA','err');return;}

  // Usar scores já salvos se disponíveis (evita chamada extra à IA)
  const temScores=sessoes.every(s=>s.avaliacao_ia?.scores);
  if(temScores){
    const dadosProntos={
      sessoes:sessoes.map(s=>{
        const sc=s.avaliacao_ia.scores||{};
        return{n:s.numero_sessao,edema:sc.edema||3,fibrose:sc.fibrose||3,cicatriz:sc.cicatriz||3};
      }),
      resumo:''
    };
    // Gerar só o resumo
    S.loadingEvolucao=true;S.evolucaoIA=dadosProntos;setTab('timeline');
    const{data:{session}}=await sb.auth.getSession();if(!session)return;
    try{
      const historico=sessoes.map(s=>'S'+s.numero_sessao+': '+s.avaliacao_ia.resultado).join(' | ');
      const r=await fetch(`${SUPA_URL}/functions/v1/ia-proxy`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},body:JSON.stringify({model:AI_MODEL,max_tokens:150,messages:[{role:'user',content:'Resuma em 60 palavras a evolução desta paciente de pós-op: '+historico}]})});
      const d=await r.json();
      dadosProntos.resumo=d.content?.[0]?.text||'';
      S.evolucaoIA={...dadosProntos};
    }catch{}
    S.loadingEvolucao=false;setTab('timeline');
    return;
  }

  // Fallback: pedir scores completos à IA
  // Verificar se IA está habilitada no plano
  if(S.assinatura&&S.assinatura.ia_habilitada===false){
    toast('A análise por IA não está disponível no seu plano atual.','err');return;
  }
  S.loadingEvolucao=true;S.evolucaoIA=null;setTab('timeline');
  const{data:{session}}=await sb.auth.getSession();if(!session)return;
  const historico=sessoes.map(s=>'Sessão '+s.numero_sessao+' ('+fmtD(s.data_sessao)+'):\n'+s.avaliacao_ia.resultado).join('\n\n---\n\n');
  const prompt='Analise a evolução desta paciente de fisioterapia pós-operatória com base nas avaliações abaixo.\nRetorne APENAS um JSON válido (sem markdown) neste formato: {"sessoes":[{"n":1,"edema":3,"fibrose":4,"cicatriz":2}],"resumo":"até 60 palavras"}\nEscala: 1=ruim 5=ótimo.\nAvaliações:\n'+historico;
  try{
    const r=await fetch(`${SUPA_URL}/functions/v1/ia-proxy`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},body:JSON.stringify({model:AI_MODEL,max_tokens:512,messages:[{role:'user',content:prompt}]})});
    const d=await r.json();if(!r.ok)throw new Error(d.error);
    const txt=d.content?.[0]?.text||'';
    S.evolucaoIA=JSON.parse(txt.replace(/```json?|```/g,'').trim());
  }catch(e){toast('Erro: '+e.message,'err');}
  S.loadingEvolucao=false;setTab('timeline');
}

function rGraficoEvolucao(){
  if(S.loadingEvolucao)return`<div class="evolucao-box"><div class="ai-loading" style="justify-content:center;padding:20px;color:var(--txt2)"><div class="ai-spin" style="border-color:rgba(79,160,212,.3);border-top-color:var(--primary)"></div> Analisando evolução…</div></div>`;
  if(!S.evolucaoIA)return'';
  const{sessoes,resumo}=S.evolucaoIA;
  if(!sessoes?.length)return'';
  const W=460,H=180,PAD={t:20,r:16,b:32,l:32};
  const iW=W-PAD.l-PAD.r,iH=H-PAD.t-PAD.b;
  const n=sessoes.length;
  const xS=(i)=>PAD.l+i*(iW/(Math.max(n-1,1)));
  const yS=(v)=>PAD.t+iH-((v-1)/(4))*iH;
  const line=(key,color)=>{
    const pts=sessoes.map((s,i)=>`${xS(i)},${yS(s[key]||1)}`).join(' ');
    const area=`M ${xS(0)},${yS(sessoes[0][key]||1)} `+sessoes.slice(1).map((s,i)=>`L ${xS(i+1)},${yS(s[key]||1)}`).join(' ')+` L ${xS(n-1)},${PAD.t+iH} L ${xS(0)},${PAD.t+iH} Z`;
    return`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="${area}" fill="${color}" fill-opacity="0.08"/>
    ${sessoes.map((s,i)=>`<circle cx="${xS(i)}" cy="${yS(s[key]||1)}" r="3.5" fill="${color}" stroke="white" stroke-width="1.5"/>`).join('')}`;
  };
  const gridLines=[1,2,3,4,5].map(v=>`<line x1="${PAD.l}" y1="${yS(v)}" x2="${W-PAD.r}" y2="${yS(v)}" stroke="#E2DDE6" stroke-width="1" stroke-dasharray="3,3"/><text x="${PAD.l-6}" y="${yS(v)+4}" font-size="9" fill="#9AA5B4" text-anchor="end">${v}</text>`).join('');
  const xLabels=sessoes.map((s,i)=>`<text x="${xS(i)}" y="${H-6}" font-size="9" fill="#9AA5B4" text-anchor="middle">S${s.n}</text>`).join('');
  const svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;overflow:visible">${gridLines}${xLabels}${line('edema','#4fa0d4')}${line('fibrose','#f59e0b')}${line('cicatriz','#95bb29')}</svg>`;
  return`<div class="evolucao-box">
    <div class="flex jb ai-c" style="margin-bottom:12px">
      <div class="card-t">📊 Análise de Evolução</div>
      <button class="btn btn-s btn-sm" onclick="S.evolucaoIA=null;setTab('timeline')">✕</button>
    </div>
    <div class="evol-legend">
      <div class="evol-leg-item"><div class="evol-leg-dot" style="background:#4fa0d4"></div>💧 Edema</div>
      <div class="evol-leg-item"><div class="evol-leg-dot" style="background:#f59e0b"></div>🔶 Fibrose</div>
      <div class="evol-leg-item"><div class="evol-leg-dot" style="background:#95bb29"></div>🌿 Cicatrizacao</div>
      <div style="font-size:10px;color:var(--txt3);margin-left:8px">1=ruim · 5=otimo</div>
    </div>
    ${svg}
    ${resumo?`<div class="evolucao-resumo">💬 ${resumo}</div>`:''}
  </div>`;
}

function bindSlider(){
  const wrap=document.getElementById('slw');
  const after=document.getElementById('sla');
  const handle=document.getElementById('slh');
  if(!wrap)return;
  let active=false;

  const move=clientX=>{
    const rect=wrap.getBoundingClientRect();
    const pct=Math.max(2,Math.min(98,(clientX-rect.left)/rect.width*100));
    handle.style.left=pct+'%';
    after.style.clipPath='inset(0 '+(100-pct)+'% 0 0)';
  };

  wrap.addEventListener('mousedown',e=>{active=true;move(e.clientX);e.preventDefault();});
  wrap.addEventListener('touchstart',e=>{active=true;move(e.touches[0].clientX);},{passive:true});
  window.addEventListener('mousemove',e=>{if(active)move(e.clientX);});
  window.addEventListener('touchmove',e=>{if(active){move(e.touches[0].clientX);e.preventDefault();}},{passive:false});
  window.addEventListener('mouseup',()=>active=false);
  window.addEventListener('touchend',()=>active=false);
}

// ── URLs ASSINADAS (bucket privado) ──
function storagePathFromUrl(u){
  if(!u) return null;
  // Se ja e um path (sem http), retorna direto
  if(u.indexOf('http')!==0) return u;
  // Extrai path apos /healtrack/ de URLs antigas
  var m=u.match(/\/healtrack\/(.+?)(\?|$)/);
  return m?m[1]:null;
}

async function assinarAvatar(pac){
  if(!pac||!pac.foto_url) return;
  var path=storagePathFromUrl(pac.foto_url);
  if(!path||path.indexOf('http')===0||path.indexOf('data:')===0) return;
  try{
    var r=await sb.storage.from('healtrack').createSignedUrl(path,3600);
    if(r&&r.data&&r.data.signedUrl) pac.foto_url=r.data.signedUrl;
  }catch(e){}
}
async function assinarAvatares(pacs){
  if(!pacs||!pacs.length) return;
  var paths=[],mapPac={};
  pacs.forEach(function(p){
    if(p.foto_url){
      var path=storagePathFromUrl(p.foto_url);
      if(path&&path.indexOf('http')!==0&&path.indexOf('data:')!==0){ paths.push(path); mapPac[path]=p; }
    }
  });
  if(!paths.length) return;
  try{
    var res=await sb.storage.from('healtrack').createSignedUrls(paths,3600);
    if(res&&res.data) res.data.forEach(function(it){ if(it.path&&it.signedUrl&&mapPac[it.path]) mapPac[it.path].foto_url=it.signedUrl; });
  }catch(e){}
}
async function assinarFotosPac(pac){
  if(!pac||!pac.pacotes) return;
  // Coletar todos os paths
  var fotos=[];
  pac.pacotes.forEach(function(pk){
    (pk.sessoes||[]).forEach(function(s){
      (s.fotos_sessao||[]).forEach(function(f){ fotos.push(f); });
    });
  });
  if(!fotos.length) return;
  var paths=fotos.map(function(f){ return storagePathFromUrl(f.url); }).filter(Boolean);
  if(!paths.length) return;
  try{
    var res=await sb.storage.from('healtrack').createSignedUrls(paths, 3600);
    if(res&&res.data){
      var map={};
      res.data.forEach(function(item){ if(item.path&&item.signedUrl) map[item.path]=item.signedUrl; });
      fotos.forEach(function(f){
        var p=storagePathFromUrl(f.url);
        if(p&&map[p]) f.url=map[p];
      });
    }
  }catch(e){ console.error('Erro ao assinar fotos',e); }

function verificarConflito(data,hIni,hFim,excId=null){
  if(!hIni)return[];
  const toMin=h=>{const[hh,mm]=h.split(':').map(Number);return hh*60+mm;};
  const novoIni=toMin(hIni),novoFim=hFim?toMin(hFim):novoIni+60;
  return S.agenda.filter(e=>{
    if(e.id===excId||e.data!==data||!e.hora_inicio||e.status==='cancelado')return false;
    const eIni=toMin(e.hora_inicio),eFim=e.hora_fim?toMin(e.hora_fim):eIni+60;
    return eIni<novoFim&&eFim>novoIni;
  });
}

function gerarSerie(dados,{freq,reps,diasSemana}){
  const evs=[],base=new Date(dados.data+'T12:00:00');
  let cur=new Date(base),count=0,maxDays=120;
  while(count<reps&&maxDays-->0){
    const dow=cur.getDay();
    const ok=freq==='diaria'||(freq==='semanal'&&diasSemana.includes(dow));
    if(ok){evs.push({...dados,data:cur.toISOString().split('T')[0]});count++;}
    cur.setDate(cur.getDate()+1);
  }
  return evs;
}

// ── MARKDOWN PARSER ──
function mdHTML(text){
  if(!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^#{1,3} (.+)$/gm,'<div style="font-weight:700;font-size:14px;margin:8px 0 4px;color:#fff">$1</div>')
    .replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
    .replace(/^[-•–] (.+)$/gm,'<div style="padding-left:12px;margin:3px 0">· $1</div>')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

function parseBoldPDF(text, fs, baseColor){
  const parts=[];
  const re=/\*\*([^*]+)\*\*/g;
  let last=0, m;
  while((m=re.exec(text))!==null){
    if(m.index>last) parts.push({text:text.slice(last,m.index),fontSize:fs,color:baseColor||'#4A5568'});
    parts.push({text:m[1],fontSize:fs,bold:true,color:baseColor||'#1A1D2E'});
    last=m.index+m[0].length;
  }
  if(last<text.length) parts.push({text:text.slice(last),fontSize:fs,color:baseColor||'#4A5568'});
  return parts.length===1?parts[0]:parts.length?parts:{text:text,fontSize:fs};
}

function mdPDF(text, fs){
  if(!text) return [];
  const lines=text.split('\n');
  const result=[];
  let ulBuffer=[];

  const flushUL=()=>{
    if(!ulBuffer.length) return;
    result.push({ul:ulBuffer,fontSize:fs-1,color:'#4A5568',margin:[0,2,0,6]});
    ulBuffer=[];
  };

  for(const raw of lines){
    const line=raw.trim();
    if(!line){flushUL();result.push({text:' ',margin:[0,2,0,2]});continue;}

    // Título ## ou #
    if(/^#{1,3} /.test(line)){
      flushUL();
      const lvl=(line.match(/^#+/)||[''])[0].length;
      const txt=line.replace(/^#+\s*/,'');
      result.push({text:txt,fontSize:fs+(lvl===1?3:lvl===2?2:1),bold:true,color:'#1A1D2E',margin:[0,10,0,4]});
      continue;
    }
    // Item de lista
    if(/^[-•*–]\s/.test(line)){
      ulBuffer.push(parseBoldPDF(line.replace(/^[-•*–]\s/,''),fs-1));
      continue;
    }
    // Linha normal
    flushUL();
    result.push({text:parseBoldPDF(line,fs),lineHeight:1.5,margin:[0,1,0,1]});
  }
  flushUL();
  return result;
}

// ── GRÁFICO PARA PDF ──
function graficoParaPDF(dados){
  if(!dados?.sessoes?.length) return null;
  const {sessoes}=dados;
  const W=520,H=220,P={t:30,r:24,b:44,l:52};
  const iW=W-P.l-P.r,iH=H-P.t-P.b;
  const n=sessoes.length;
  const xS=i=>P.l+(n===1?iW/2:i*(iW/Math.max(n-1,1)));
  const yS=v=>P.t+iH-((Math.min(Math.max(v,1),5)-1)/4)*iH;

  const c=document.createElement('canvas');
  c.width=W*2;c.height=H*2;
  const ctx=c.getContext('2d');
  ctx.scale(2,2);

  // Fundo com gradiente suave
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#F8FAFF');bg.addColorStop(1,'#FFFFFF');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Faixas horizontais de zona
  const zonas=[
    {min:1,max:2,color:'rgba(224,69,69,0.06)',label:'Ruim'},
    {min:2,max:3,color:'rgba(212,134,10,0.06)',label:'Regular'},
    {min:3,max:4,color:'rgba(149,187,41,0.06)',label:'Bom'},
    {min:4,max:5,color:'rgba(79,160,212,0.08)',label:'Otimo'},
  ];
  zonas.forEach(z=>{
    ctx.fillStyle=z.color;
    ctx.fillRect(P.l,yS(z.max+1),iW,yS(z.min)-yS(z.max+1));
  });

  // Grid horizontal
  ctx.setLineDash([3,4]);ctx.strokeStyle='#DDE2EA';ctx.lineWidth=0.7;
  [1,2,3,4,5].forEach(v=>{
    ctx.beginPath();ctx.moveTo(P.l,yS(v));ctx.lineTo(W-P.r,yS(v));ctx.stroke();
  });
  ctx.setLineDash([]);

  // Labels Y com ícone de qualidade
  const yLabels={1:'😞',2:'😐',3:'🙂',4:'😊',5:'🌟'};
  ctx.font='11px sans-serif';ctx.textAlign='right';
  [1,2,3,4,5].forEach(v=>{
    ctx.fillStyle='#9AA5B4';
    ctx.fillText(yLabels[v],P.l-6,yS(v)+4);
  });

  // Labels X
  ctx.textAlign='center';ctx.font='bold 9px sans-serif';ctx.fillStyle='#4A5568';
  sessoes.forEach((s,i)=>ctx.fillText('S'+s.n,xS(i),H-10));

  // Séries
  const series=[
    {key:'edema',   color:'#4fa0d4',emoji:'💧'},
    {key:'fibrose', color:'#f59e0b',emoji:'🔶'},
    {key:'cicatriz',color:'#95bb29',emoji:'🌿'}
  ];

  series.forEach(({key,color})=>{
    const pts=sessoes.map((s,i)=>({x:xS(i),y:yS(s[key]||3)}));

    // Área preenchida com gradiente
    const grad=ctx.createLinearGradient(0,P.t,0,P.t+iH);
    grad.addColorStop(0,color+'40');grad.addColorStop(1,color+'05');
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    if(pts.length>1){
      // Curva suave (bezier)
      for(let i=1;i<pts.length;i++){
        const cx=(pts[i-1].x+pts[i].x)/2;
        ctx.bezierCurveTo(cx,pts[i-1].y,cx,pts[i].y,pts[i].x,pts[i].y);
      }
    }
    ctx.lineTo(pts[pts.length-1].x,P.t+iH);
    ctx.lineTo(pts[0].x,P.t+iH);
    ctx.closePath();
    ctx.fillStyle=grad;ctx.fill();

    // Linha suave
    ctx.beginPath();
    ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
    ctx.moveTo(pts[0].x,pts[0].y);
    if(pts.length>1){
      for(let i=1;i<pts.length;i++){
        const cx=(pts[i-1].x+pts[i].x)/2;
        ctx.bezierCurveTo(cx,pts[i-1].y,cx,pts[i].y,pts[i].x,pts[i].y);
      }
    }
    ctx.stroke();

    // Pontos com valor
    pts.forEach((pt,i)=>{
      const v=sessoes[i][key]||3;
      // Sombra
      ctx.shadowColor=color+'60';ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(pt.x,pt.y,5,0,Math.PI*2);
      ctx.fillStyle=color;ctx.fill();
      ctx.shadowBlur=0;
      // Borda branca
      ctx.beginPath();ctx.arc(pt.x,pt.y,5,0,Math.PI*2);
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
      // Valor acima do ponto
      ctx.font='bold 8px sans-serif';ctx.fillStyle=color;ctx.textAlign='center';
      ctx.fillText(v,pt.x,pt.y-9);
    });
  });

  // Legenda compacta no topo
  ctx.shadowBlur=0;
  const legItems=[['💧 Edema','#4fa0d4'],['🔶 Fibrose','#f59e0b'],['🌿 Cicatriz','#95bb29']];
  let lx=P.l;
  const ly=13;
  legItems.forEach(([label,color])=>{
    ctx.beginPath();ctx.arc(lx+4,ly,4,0,Math.PI*2);
    ctx.fillStyle=color;ctx.fill();
    ctx.fillStyle='#52525B';ctx.font='bold 8px sans-serif';ctx.textAlign='left';
    ctx.fillText(label,lx+11,ly+3);
    lx+=75;
  });

  return c.toDataURL('image/png');
}

  const p=S.pac;if(!p){toast('Nenhum paciente','err');return;}
  const a=p.anamnese?.[0]||{},pk=p.pacotes?.find(pk=>pk.status==='ativo');
  const sessoes=(pk?.sessoes||[]).sort((x,y)=>new Date(x.data_sessao)-new Date(y.data_sessao));
  const fase=calcFase(a.data_cirurgia),cor=corPDF();
  const feitas=sessoes.length,total=pk?.total_sessoes||0,pct=total>0?Math.round((feitas/total)*100):0;
  const cfgPDF=S.config.pdf_opts||{};
  const fs=cfgPDF.fonte||11;
  toast('Preparando PDF...');
  await loadPDFMake();
  const fotosMap=await fotosParaPDF(sessoes,cfgPDF);
  const fCorMap={'fase-1':'#E04545','fase-2':'#D4860A','fase-3':'#95bb29'};
  const fNomeMap={'fase-1':'Fase Inflamatoria','fase-2':'Fase Proliferativa','fase-3':'Fase de Remodelamento'};
  const faseKey=fase?.cls?.replace('f','fase-')||'fase-3';

  // Helper: limpar markdown do texto da IA
  const limparMD=txt=>{
    if(!txt)return'';
    return txt
      .replace(/\*\*([^*]+)\*\*/g,'$1')
      .replace(/\*([^*]+)\*/g,'$1')
      .replace(/^#{1,3}\s+/gm,'')
      .replace(/^[-•]\s+/gm,'- ')
      .trim();
  };

  const content=[];

  // ── CABECALHO ──
  const logo=S.config.pdf_logo;
  const clinica=S.config.pdf_clinica||'Healtrack';
  content.push({columns:[
    logo?{image:logo,width:44,height:44}:{text:''},
    {stack:[
      {text:clinica,fontSize:fs+6,bold:true,color:cor},
      {text:'Relatorio de Acompanhamento',fontSize:fs,color:'#4A5568',margin:[0,2,0,0]},
      {text:'Emitido em '+fmtD(new Date().toISOString().split('T')[0]),fontSize:fs-2,color:'#9AA5B4',margin:[0,1,0,0]}
    ],margin:[logo?12:0,0,0,0]},
    {text:'',width:'*'}
  ],margin:[0,0,0,8]});
  content.push({canvas:[{type:'line',x1:0,y1:0,x2:515,y2:0,lineWidth:2,lineColor:cor}],margin:[0,0,0,16]});

  // ── DADOS DO PACIENTE ──
  content.push({text:p.nome,fontSize:fs+5,bold:true,color:'#1A1D2E',margin:[0,0,0,6]});
  const metaItens=[];
  if(a.tipo_cirurgia) metaItens.push({text:'Cirurgia: '+a.tipo_cirurgia,fontSize:fs,color:'#4A5568'});
  if(a.data_cirurgia) metaItens.push({text:'Data cirurgia: '+fmtD(a.data_cirurgia),fontSize:fs,color:'#4A5568'});
  if(fase) metaItens.push({text:(fNomeMap[faseKey]||'')+' (D'+fase.dias+')',fontSize:fs,bold:true,color:fCorMap[faseKey]||cor});
  if(a.cirurgiao) metaItens.push({text:'Cirurgiao: '+a.cirurgiao,fontSize:fs,color:'#4A5568'});
  if(metaItens.length) content.push({columns:metaItens,columnGap:16,margin:[0,0,0,12]});

  // ── PROGRESSO ──
  if(pk){
    const bW=515,filled=Math.round((feitas/Math.max(total,1))*bW);
    content.push({
      text:'Progresso: '+feitas+' de '+total+' sessoes ('+pct+'%)',
      fontSize:fs,bold:true,color:'#1A1D2E',margin:[0,0,0,6]
    });
    content.push({canvas:[
      {type:'rect',x:0,y:0,w:bW,h:8,r:4,color:'#DDE2EA'},
      {type:'rect',x:0,y:0,w:filled,h:8,r:4,color:cor}
    ],margin:[0,0,0,18]});
  }

  // ── GRAFICO ──
  if(cfgPDF.incluir_grafico!==false&&S.evolucaoIA){
    const imgG=graficoParaPDF(S.evolucaoIA);
    if(imgG){
      content.push({canvas:[{type:'line',x1:0,y1:0,x2:515,y2:0,lineWidth:0.5,lineColor:'#DDE2EA'}],margin:[0,0,0,12]});
      content.push({text:'Grafico de Evolucao',fontSize:fs+1,bold:true,color:'#1A1D2E',margin:[0,0,0,8]});
      content.push({image:imgG,fit:[480,210],margin:[0,0,0,6]});
      if(S.evolucaoIA.resumo) content.push({text:S.evolucaoIA.resumo,fontSize:fs-1,color:'#4A5568',italics:true,margin:[0,0,0,16]});
    }
  }

  // ── SESSOES ──
  if(sessoes.length){
    content.push({canvas:[{type:'line',x1:0,y1:0,x2:515,y2:0,lineWidth:0.5,lineColor:'#DDE2EA'}],margin:[0,0,0,14]});
    content.push({text:'Historico de Sessoes',fontSize:fs+1,bold:true,color:'#1A1D2E',margin:[0,0,0,12]});

    sessoes.forEach((s,idx)=>{
      const procs=Array.isArray(s.procedimentos)?s.procedimentos:JSON.parse(s.procedimentos||'[]');
      const fk=s.fase_cicatrizacao||'fase-3';
      const fCor=fCorMap[fk]||cor;

      // Cabecalho da sessao — bloco indivisivel (nunca quebra entre titulo e conteudo)
      const headStack=[
        {columns:[
          {text:'Sessao '+s.numero_sessao,fontSize:fs,bold:true,color:cor,width:'*'},
          {text:fmtD(s.data_sessao),fontSize:fs-1,color:'#9AA5B4',width:'auto',margin:[0,1,0,0]},
          {text:'   '+(fNomeMap[fk]||''),fontSize:fs-2,bold:true,color:fCor,width:'auto',margin:[0,1,0,0]}
        ],columnGap:6,margin:[0,0,0,5]},
        {canvas:[{type:'line',x1:0,y1:0,x2:515,y2:0,lineWidth:0.5,lineColor:'#DDE2EA'}],margin:[0,0,0,6]}
      ];
      if(procs.length){
        headStack.push({text:[{text:'Procedimentos: ',bold:true,color:'#1A1D2E'},{text:procs.join(', '),color:'#4A5568'}],fontSize:fs-1,margin:[0,0,0,4]});
      }
      content.push({stack:headStack,unbreakable:true,margin:[0,idx>0?12:0,0,0]});

      if(s.notas){
        content.push({text:[{text:'Evolucao: ',bold:true,color:'#1A1D2E'},{text:s.notas,color:'#4A5568'}],fontSize:fs-1,lineHeight:1.5,margin:[0,0,0,4]});
      }
      if(cfgPDF.incluir_ia!==false&&s.avaliacao_ia?.resultado){
        content.push({text:limparMD(s.avaliacao_ia.resultado),fontSize:fs-1,color:'#3a4163',lineHeight:1.6,margin:[0,0,0,4]});
      }
      if(cfgPDF.incluir_fotos!==false&&fotosMap[s.id]?.length){
        const fotos=fotosMap[s.id];
        for(let r=0;r<fotos.length;r+=4){
          const linha=fotos.slice(r,r+4).map(f=>({width:'auto',stack:[
            {image:f.b64,width:108,height:108,fit:[108,108]},
            f.regiao?{text:f.regiao,fontSize:fs-3,color:'#9AA5B4',alignment:'center',margin:[0,2,0,0]}:{text:''}
          ]}));
          content.push({columns:linha,columnGap:8,margin:[0,6,0,0],unbreakable:true});
        }
      }
    });
  }

  // ── RODAPE ──
  content.push({stack:[
    {canvas:[{type:'line',x1:0,y1:0,x2:515,y2:0,lineWidth:1,lineColor:cor}],margin:[0,18,0,10]},
    {columns:[
      {text:S.config.pdf_rodape||'',fontSize:fs-2,color:'#9AA5B4',width:'*'},
      {stack:[
        {canvas:[{type:'line',x1:30,y1:0,x2:160,y2:0,lineWidth:1,lineColor:'#D4CDC4'}]},
        {text:S.config.nome_profissional||'Profissional',fontSize:fs-1,bold:true,color:'#1A1D2E',alignment:'center',margin:[0,4,0,0]},
        {text:S.config.crefito||'',fontSize:fs-2,color:'#4A5568',alignment:'center'}
      ],width:190}
    ]}
  ],unbreakable:true});

  const pgSize=cfgPDF.pagina||'A4';
  const mg=[cfgPDF.margem_h||40,cfgPDF.margem_v||40,cfgPDF.margem_h||40,cfgPDF.margem_v||56];
  previewPDF({pageSize:pgSize,pageMargins:mg,content,styles:pdfStyles(cor),defaultStyle:{font:'Roboto'}},'Relatorio_'+p.nome.replace(/\s+/g,'_')+'.pdf');
}

function nav(view,params={}){
  S.view=view;S.params=params;
  try{closeSb();}catch(e){}
  // Salvar no hash para sobreviver ao reload
  let hash=view;
  if(view==='paciente'&&S.pac?.id) hash='paciente/'+S.pac.id+'/'+S.tab;
  else if(view==='sessao'&&S.pac?.id) hash='sessao/'+S.pac.id;
  else if(view==='agenda') hash='agenda/'+S.agView;
  history.replaceState(null,'','#'+hash);
  render();
  window.scrollTo(0,0);
}

}

        <div class="u-name">${S.profAtual?S.profAtual.nome.split(' ')[0]:nome.split(' ')[0]}</div>
        <div class="u-role">${S.profAtual?(S.profAtual.crefito||nivelLabel(S.profAtual.nivel)):(S.config.crefito||'Fisioterapeuta')}</div>
        ${nivelRestrito()&&!temAcessoSensivel()?'<div style="font-size:9px;color:#f59e0b;margin-top:1px">🔒 Modo restrito</div>':''}
      </div>
      ${S.profissionais.length>0?`<button class="trocar-perfil-btn" onclick="trocarPerfil()" title="Trocar perfil">${icon('swap')}</button>`:''}
      </div>

function rView(){
  switch(S.view){
    case 'dashboard':return rDash();
    case 'pacientes':return rPacientes();

function bindLogin(){

</div></div>`;}

function bindCadastro(){
  const btn=document.getElementById('cbtn');
  const doCadastro=async()=>{
    const nome=document.getElementById('cnome').value.trim();
    const email=document.getElementById('cemail').value.trim();
    const senha=document.getElementById('csenha').value;
    const senha2=document.getElementById('csenha2').value;
    const err=document.getElementById('cerr');
    err.style.display='none';
    if(!nome){err.textContent='Informe o nome da clínica.';err.style.display='block';return;}
    if(!email||!email.includes('@')){err.textContent='E-mail inválido.';err.style.display='block';return;}
    if(senha.length<8){err.textContent='A senha deve ter pelo menos 8 caracteres.';err.style.display='block';return;}
    if(senha!==senha2){err.textContent='As senhas não coincidem.';err.style.display='block';return;}
    btn.textContent='Criando conta…';btn.disabled=true;
    try{
      const{data,error}=await sb.auth.signUp({
        email,
        password:senha,
        options:{data:{nome_clinica:nome}}
      });
      if(error)throw error;
      if(data.user){
        // Salvar nome da clínica na config
        await sb.from('configuracoes').upsert({
          user_id:data.user.id,
          dados:{nome_profissional:nome,clinica:nome},
          updated_at:new Date().toISOString()
        },{onConflict:'user_id'});
        // Mostrar confirmação
        const app=document.getElementById('app');
        app.innerHTML=`<div class="login-pg"><div class="login-bg"></div><div class="login-card" style="text-align:center">
          <div style="font-size:56px;margin-bottom:16px">🎉</div>
          <h2 style="font-family:'DM Serif Display',serif;font-size:24px;color:var(--primary-dk);margin-bottom:10px">Conta criada!</h2>
          <p style="color:var(--txt2);font-size:15px;margin-bottom:20px">Acesse seu e-mail <strong>${escH(email)}</strong> para confirmar sua conta.</p>
          <div style="background:var(--primary-lt);border-radius:var(--r-sm);padding:14px;margin-bottom:20px;font-size:13px;color:var(--primary-dk)">
            Após confirmar, seu trial gratuito de <strong>14 dias</strong> já estará ativo.
          </div>
          <button class="btn btn-p" style="width:100%;justify-content:center" onclick="nav('login')">Ir para o login</button>
        </div></div>`;
      }
    }catch(e){
      err.textContent=e.message||'Erro ao criar conta. Tente novamente.';
      err.style.display='block';
      btn.textContent='Criar conta grátis';btn.disabled=false;
    }
  };
  btn?.addEventListener('click',doCadastro);
  document.getElementById('csenha2')?.addEventListener('keydown',e=>{if(e.key==='Enter')doCadastro();});
}

// ── DASHBOARD ──
function rDash(){
  const pacs=S.pacientes||[];
  const hoje=new Date();
  const hojeStr=hoje.toISOString().split('T')[0];
  const hr=hoje.getHours();
  const saudacao=hr<12?'Bom dia':(hr<18?'Boa tarde':'Boa noite');
  const nomePro=S.profAtual?.nome?.split(' ')[0]||S.config.nome_profissional?.split(' ')[0]||'';

  // KPIs
  const ativos=pacs.filter(p=>p.pacotes?.some(pk=>pk.status==='ativo')).length;
  const inflamatorios=pacs.filter(p=>{
    const a=p.anamnese?.[0];
    if(!a?.data_cirurgia)return false;
    const dias=Math.floor((Date.now()-new Date(a.data_cirurgia))/86400000);
    return dias>=0&&dias<=5;
  }).length;
  const concluindo=pacs.filter(p=>{
    const pk=p.pacotes?.find(pk=>pk.status==='ativo');
    if(!pk)return false;
    const sessoes=Array.isArray(pk.sessoes)?pk.sessoes.length:(pk.sessoes?.[0]?.count||0);
    return pk.total_sessoes-sessoes<=3&&sessoes<pk.total_sessoes;
  }).length;
  const agendaHojeEvs=(S.agenda||[]).filter(e=>e.data===hojeStr&&e.status==='agendado').sort((a,b)=>(a.hora_inicio||'').localeCompare(b.hora_inicio||''));
  const proximosEvs=(S.agenda||[]).filter(e=>e.data>hojeStr&&e.status==='agendado').sort((a,b)=>a.data.localeCompare(b.data)).slice(0,4);

  // Pacientes que precisam de atencao
  const atencao=pacs.filter(p=>{
    const a=p.anamnese?.[0];
    if(!a?.data_cirurgia)return false;
    const fase=calcFase(a.data_cirurgia);
    return fase&&fase.cls==='f1';
  }).slice(0,4);

  return`<div class="ph">
    <div>
      <h1 class="ph-title">${saudacao}${nomePro?', '+nomePro:''}!</h1>
      <p class="ph-sub">${hojeStr===new Date().toISOString().split('T')[0]?'Hoje, '+['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sabado'][hoje.getDay()]+' '+hoje.getDate():''}</p>
    </div>
    <button class="btn btn-p" id="bnp">+ Novo Paciente</button>
  </div>
  <div class="pc">

    <!-- KPIs -->
    <div class="kpi-grid">
      ${[
        {label:'Pacientes Ativos',val:ativos,icon:'👥',cor:'var(--primary)',sub:'com pacote ativo'},
        {label:'Agenda Hoje',val:agendaHojeEvs.length,icon:'📅',cor:'var(--accent)',sub:'compromissos',onclick:"S.agView='hoje';nav('agenda')"},
        {label:'Fase Inflamatorias',val:inflamatorios,icon:'🔴',cor:'#E04545',sub:'precisam atencao'},
        {label:'Concluindo',val:concluindo,icon:'📦',cor:'#D4860A',sub:'ate 3 sessoes'},
      ].map(k=>`
        <div class="card" style="cursor:${k.onclick?'pointer':'default'};border-left:3px solid ${k.cor}" ${k.onclick?`onclick="${k.onclick}"`:''}> 
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px">${k.label}</span>
            <span style="font-size:20px">${k.icon}</span>
          </div>
          <div style="font-family:'DM Serif Display',serif;font-size:32px;color:${k.cor};line-height:1">${k.val}</div>
          <div style="font-size:11px;color:var(--txt3);margin-top:4px">${k.sub}</div>
        </div>`).join('')}
    </div>

    <div class="dash-grid" class="dash-grid">
      <div style="display:flex;flex-direction:column;gap:20px">

        <!-- Agenda do Dia -->
        <div class="card">
          <div class="card-hd">
            <div class="card-t">📅 Agenda de Hoje</div>
            <button class="btn btn-s btn-sm" onclick="S.agView='hoje';nav('agenda')">Ver agenda</button>
          </div>
          ${agendaHojeEvs.length===0
            ?`<div style="text-align:center;padding:24px;color:var(--txt3);font-size:13px">Nenhum compromisso hoje<br><button class="btn btn-p btn-sm mt12" onclick="modalNovoEvento('')">+ Agendar</button></div>`
            :`<div style="display:flex;flex-direction:column;gap:8px">${agendaHojeEvs.map(e=>{
              const pac=pacs.find(p=>p.id===e.paciente_id);
              return`<div style="display:flex;align-items:center;gap:12px;padding:10px;background:var(--surface-2);border-radius:var(--r-sm);cursor:pointer" onclick="verEvento('${e.id}')">
                <div style="font-family:'DM Serif Display',serif;font-size:18px;color:var(--primary-dk);min-width:44px">${fmtH(e.hora_inicio)}</div>
                <div style="flex:1">
                  <div style="font-size:14px;font-weight:600">${e.titulo}</div>
                  ${pac?`<div style="font-size:12px;color:var(--txt3)">${pac.nome}</div>`:''}
                </div>
                <span class="badge b-p">${fmtH(e.hora_fim)||''}</span>
              </div>`;}).join('')}</div>`}
        </div>

        <!-- Pacientes recentes -->
        <div class="card">
          <div class="card-hd">
            <div class="card-t">👥 Pacientes</div>
            <button class="btn btn-s btn-sm" onclick="nav('dashboard')">Ver todos</button>
          </div>
          ${pacs.length===0
            ?`<div style="text-align:center;padding:32px;color:var(--txt3)">Nenhum paciente cadastrado</div>`
            :`<div style="display:flex;flex-direction:column;gap:6px">${pacs.slice(0,6).map(p=>{
              const a=p.anamnese?.[0],pk=p.pacotes?.find(pk=>pk.status==='ativo');
              let feitas=0;if(pk?.sessoes){if(Array.isArray(pk.sessoes))feitas=pk.sessoes.length;else if(pk.sessoes[0]?.count!==undefined)feitas=pk.sessoes[0].count;}
              const total=pk?.total_sessoes||0,pct=total>0?Math.round((feitas/total)*100):0;
              const fase=calcFase(a?.data_cirurgia);
              return`<div style="display:flex;align-items:center;gap:12px;padding:10px;background:var(--surface-2);border-radius:var(--r-sm);cursor:pointer" onclick="openPac('${p.id}')">
                <div class="pac-av" style="width:36px;height:36px;font-size:13px">${ini(p.nome)}</div>
                <div style="flex:1;min-width:0">
                  <div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.nome}</div>
                  <div style="font-size:11px;color:var(--txt3)">${a?.tipo_cirurgia||'--'}</div>
                </div>
                ${fase?`<span class="badge b-${fase.cls}" style="font-size:10px">${fase.nome.replace('Fase ','')}</span>`:''}
                ${pk?`<div style="text-align:right;min-width:52px"><div class="prog-bar" style="width:52px"><div class="prog-fill" style="width:${pct}%"></div></div><div style="font-size:10px;color:var(--txt3);margin-top:2px">${feitas}/${total}</div></div>`:''}
              </div>`;}).join('')}</div>`}
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:16px">

        <!-- Ações rápidas -->
        <div class="card">
          <div class="card-t" style="margin-bottom:12px">⚡ Acoes Rapidas</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <button class="btn btn-p" style="justify-content:center" onclick="document.getElementById('bnp').click()">+ Novo Paciente</button>
            <button class="btn btn-s" style="justify-content:center" onclick="modalNovoEvento('')">+ Agendar Compromisso</button>
            <button class="btn btn-s" style="justify-content:center" onclick="S.agView='semana';nav('agenda')">📅 Ver Semana</button>
          </div>
        </div>

        <!-- Atencao -->
        ${atencao.length?`<div class="card">
          <div class="card-hd"><div class="card-t" style="color:#E04545">🔴 Atencao — Fase Inflamatoria</div></div>
          <div style="font-size:12px;color:var(--txt3);margin-bottom:10px">Pacientes em D0–D5 precisam de acompanhamento frequente</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${atencao.map(p=>{
              const fase=calcFase(p.anamnese?.[0]?.data_cirurgia);
              return`<div style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px;background:#FEF2F2;border-radius:var(--r-sm)" onclick="openPac('${p.id}')">
                <div class="pac-av" style="width:32px;height:32px;font-size:11px;background:#FECACA;color:#DC2626">${ini(p.nome)}</div>
                <div style="flex:1">
                  <div style="font-size:13px;font-weight:600">${p.nome.split(' ')[0]}</div>
                  <div style="font-size:11px;color:#DC2626">D${fase?.dias||0} pos-op</div>
                </div>
              </div>`;}).join('')}
          </div>
        </div>`:''}

        <!-- Proximos eventos -->
        ${proximosEvs.length?`<div class="card">
          <div class="card-t" style="margin-bottom:12px">📆 Proximos Eventos</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${proximosEvs.map(e=>{
              const pac=pacs.find(p=>p.id===e.paciente_id);
              return`<div style="cursor:pointer" onclick="verEvento('${e.id}')">
                <div style="font-size:11px;color:var(--txt3)">${fmtD(e.data)} ${fmtH(e.hora_inicio)}</div>
                <div style="font-size:13px;font-weight:600">${e.titulo}</div>
                ${pac?`<div style="font-size:11px;color:var(--txt3)">${pac.nome}</div>`:''}
              </div>`;}).join('<div style="height:1px;background:var(--border);margin:4px 0"></div>')}
          </div>
        </div>`:''}

      </div>
    </div>

    <!-- Lista de pacientes abaixo (todos) -->
    <div class="card-t" style="margin:28px 0 16px">Todos os Pacientes (${pacs.length})</div>
    <div class="search-bar"><span class="search-ic">⌕</span><input type="text" id="busca" placeholder="Buscar por nome ou cirurgia..."></div>
    <div class="pg" id="pg">${pacs.length===0
      ?`<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--txt3)"><div style="font-size:48px;margin-bottom:12px">🌿</div><div style="font-size:16px;font-weight:600;color:var(--txt2)">Nenhum paciente ainda</div></div>`
      :pacs.slice(0,60).map(rPacCard).join('')}
    </div>
    ${pacs.length>60?`<div style="text-align:center;padding:16px;color:var(--txt3);font-size:13px">Mostrando 60 de ${pacs.length}. Use a busca para encontrar pacientes específicos.</div>`:''}

  </div>`;
}
function rPacCard(p){
  if(!p)return'';
  const a=p.anamnese?.[0],pk=p.pacotes?.find(pk=>pk.status==='ativo');
  let feitas=0;if(pk?.sessoes){if(Array.isArray(pk.sessoes))feitas=pk.sessoes.length;else if(pk.sessoes[0]?.count!==undefined)feitas=pk.sessoes[0].count;}
  const total=pk?.total_sessoes||0,pct=total>0?Math.round((feitas/total)*100):0,fase=calcFase(a?.data_cirurgia);
  return`<div class="pac-card" onclick="openPac('${p.id}')">
    <div class="pac-card-hd"><div class="pac-av">${p.foto_url?`<img src="${p.foto_url}">`:`${ini(p.nome)}`}</div>
    <div><div class="pac-nm">${p.nome}</div><div class="pac-info">${a?.tipo_cirurgia||'Sem cirurgia registrada'}</div></div></div>
    ${fase?`<span class="badge b-${fase.cls}">${fase.nome} · D${fase.dias}</span>`:''}
    ${pk?`<div class="pac-ft"><div><div class="prog-lbl">Sessões ${feitas}/${total}</div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div><span class="badge b-acc">${pct}%</span></div>`:`<div class="pac-ft"><span class="badge b-n">Sem pacote ativo</span></div>`}
  </div>`;
}

// ── AGENDA ──
function rAgendaItem(e,showDate){
  if(!e)return'';
  const pac=(S.pacientes||[]).find(function(p){return p.id===e.paciente_id;});
  const stCls={agendado:'b-p',realizado:'b-acc',cancelado:'b-f1'};
  const stLbl={agendado:'Agendado',realizado:'Realizado',cancelado:'Cancelado'};
  const fim=e.hora_fim?(' \u2014 '+fmtH(e.hora_fim)):'';
  return '<div class="agenda-item" onclick="verEvento(\''+e.id+'\')">'
    +'<div class="agenda-hora">'+fmtH(e.hora_inicio)+'<span>'+(showDate?fmtD(e.data):fim)+'</span></div>'
    +'<div class="agenda-info">'
    +'<div class="agenda-titulo">'+escH(e.titulo)+'</div>'
    +(pac?'<div class="agenda-pac">'+escH(pac.nome)+'</div>':'')
    +(e.observacoes?'<div class="agenda-obs">'+escH(e.observacoes)+'</div>':'')
    +'</div>'
    +'<span class="badge '+(stCls[e.status]||'b-n')+'">'+(stLbl[e.status]||e.status)+'</span>'
    +'</div>';
}

function rAgenda(){
  const tabs=[['hoje','Hoje'],['semana','Semana'],['mes','Mês']];
  return`<div class="ph">
    <div><h1 class="ph-title">Agenda</h1><p class="ph-sub">${agendaHoje().length} compromisso(s) hoje</p></div>
    <button class="btn btn-p" id="bne">+ Novo Evento</button>
  </div>
  <div class="pc">
    <div class="ag-tabs">${tabs.map(([id,lbl])=>`<div class="ag-tab ${S.agView===id?'active':''}" onclick="setAgView('${id}')">${lbl}</div>`).join('')}</div>
    <div id="ag-content">${rAgContent()}</div>
  </div>`;
}

function setAgView(v){
  S.agView=v;
  const el=document.getElementById('ag-content');
  if(el){el.innerHTML=rAgContent();bindAgendaEvts();}
  document.querySelectorAll('.ag-tab').forEach(t=>{
    const map={hoje:'Hoje',semana:'Semana',mes:'Mês'};
    t.classList.toggle('active',t.textContent===map[v]);
  });
  history.replaceState(null,'','#agenda/'+v);
}

function rAgContent(){
  if(S.agView==='hoje')return rHoje();
  if(S.agView==='semana')return rSemana();
  return rMes();
}

function rHoje(){
  const hoje=new Date().toISOString().split('T')[0];
  const evs=S.agenda.filter(e=>e.data===hoje).sort((a,b)=>(a.hora_inicio||'').localeCompare(b.hora_inicio||''));
  if(!evs.length)return`<div class="hoje-empty">
    <div class="hoje-empty-icon">📅</div>
    <div style="font-size:15px;font-weight:600;color:var(--txt2)">Nenhum evento hoje</div>
    <div style="font-size:13px;color:var(--txt3);margin-top:4px">Clique em "+ Novo Evento" para agendar</div>
  </div>`;
  return`<div class="hoje-resumo">${evs.map(e=>rAgendaItem(e,true)).join('')}</div>`;
}

function rSemana(){
  // Calcular dias da semana atual + offset
  const hoje=new Date();
  const dom=new Date(hoje);
  dom.setDate(hoje.getDate()-hoje.getDay()+(S.semanaOffset*7));
  const dias=Array.from({length:7},(_,i)=>{
    const d=new Date(dom);d.setDate(dom.getDate()+i);return d;
  });
  const hojeStr=hoje.toISOString().split('T')[0];
  const semStr=`${fmtD(dias[0].toISOString().split('T')[0])} — ${fmtD(dias[6].toISOString().split('T')[0])}`;
  const HORAS=Array.from({length:12},(_,i)=>i+8); // 8h–19h
  const PX_HORA=48;

  let heads=`<div class="week-head" style="border-bottom:1px solid var(--border)"></div>`;
  dias.forEach(d=>{
    const dStr=d.toISOString().split('T')[0];
    const isHoje=dStr===hojeStr;
    const dow=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()];
    heads+=`<div class="week-head ${isHoje?'hoje-col':''}">${dow}<br><span style="font-size:14px;font-weight:700">${d.getDate()}</span></div>`;
  });

  let rows='';
  HORAS.forEach(h=>{
    rows+=`<div class="week-time-col">${padZ(h)}h</div>`;
    dias.forEach(d=>{
      const dStr=d.toISOString().split('T')[0];
      const isHoje=dStr===hojeStr;
      const evsDia=S.agenda.filter(e=>e.data===dStr);
      // Renderizar eventos que iniciam nesta hora
      const evsHora=evsDia.filter(e=>{
        if(!e.hora_inicio)return false;
        return parseInt(e.hora_inicio.split(':')[0])===h;
      });
      let evsHtml=evsHora.map(e=>{
        const [eh,em]=e.hora_inicio.split(':').map(Number);
        const top=(em/60)*PX_HORA;
        let dur=60;
        if(e.hora_fim){const[fh,fm]=e.hora_fim.split(':').map(Number);dur=Math.max(30,(fh*60+fm)-(eh*60+em));}
        const height=Math.max(24,(dur/60)*PX_HORA-2);
        const pac=e.pacientes?.nome?e.pacientes.nome.split(' ')[0]:'';
        return`<div class="week-ev week-ev-${e.status}" style="top:${top}px;height:${height}px" onclick="verEvento('${e.id}')" title="${e.titulo}${pac?' — '+pac:''}">
          ${fmtH(e.hora_inicio)} ${e.titulo}${pac?`<br><span style="opacity:.7">${pac}</span>`:''}
        </div>`;
      }).join('');
      rows+=`<div class="week-col ${isHoje?'hoje-col':''}"><div class="week-slot">${evsHtml}</div></div>`;
    });
  });

  return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <button class="btn btn-s btn-sm" onclick="navSemana(-1)">←</button>
    <span style="font-size:14px;font-weight:600;color:var(--txt2)">${semStr}</span>
    <button class="btn btn-s btn-sm" onclick="navSemana(1)">→</button>
    ${S.semanaOffset!==0?`<button class="btn btn-g btn-sm" onclick="navSemana(0,true)">Hoje</button>`:''}
  </div>
  <div class="week-wrap">
    <div class="week-grid">${heads}${rows}</div>
  </div>`;
}

function rMes(){
  const hoje=new Date();
  const diasMes=new Date(S.calAno,S.calMes+1,0).getDate();
  const primeiroDia=new Date(S.calAno,S.calMes,1).getDay();
  const eventosMes=agendaMes(S.calAno,S.calMes);
  const hojeStr=`${hoje.getFullYear()}-${padZ(hoje.getMonth()+1)}-${padZ(hoje.getDate())}`;
  const diaSelStr=S.calDiaSel?`${S.calAno}-${padZ(S.calMes+1)}-${padZ(S.calDiaSel)}`:null;
  const eventosdia=diaSelStr?S.agenda.filter(e=>e.data===diaSelStr):[];

  let cells='';
  DIAS_SEMANA.forEach(d=>{cells+=`<div class="cal-dow">${d}</div>`;});
  for(let i=0;i<primeiroDia;i++){
    const dAnt=new Date(S.calAno,S.calMes,0-primeiroDia+i+1);
    cells+=`<div class="cal-day other-month"><div class="cal-day-num">${dAnt.getDate()}</div></div>`;
  }
  for(let d=1;d<=diasMes;d++){
    const dStr=`${S.calAno}-${padZ(S.calMes+1)}-${padZ(d)}`;
    const evs=eventosMes.filter(e=>e.data===dStr);
    const isHoje=dStr===hojeStr,isSel=S.calDiaSel===d;
    cells+=`<div class="cal-day ${isHoje?'today':''} ${isSel?'selected':''}" onclick="selDia(${d})">
      <div class="cal-day-num">${d}</div>
      ${evs.slice(0,2).map(e=>`<div class="cal-event cal-ev-${e.status}" onclick="event.stopPropagation();verEvento('${e.id}')">${e.hora_inicio?fmtH(e.hora_inicio)+' ':''} ${e.titulo}</div>`).join('')}
      ${evs.length>2?`<div style="font-size:10px;color:var(--txt3)">+${evs.length-2}</div>`:''}
    </div>`;
  }
  const total=primeiroDia+diasMes;const resto=(7-total%7)%7;
  for(let i=1;i<=resto;i++){cells+=`<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;}

  return`<div class="cal-layout">
    <div class="card">
      <div class="cal-header">
        <button class="btn btn-g btn-sm" onclick="navMes(-1)">←</button>
        <div class="cal-month">${MESES[S.calMes]} ${S.calAno}</div>
        <button class="btn btn-g btn-sm" onclick="navMes(1)">→</button>
      </div>
      <div class="cal-grid">${cells}</div>
    </div>
    <div>
      ${diaSelStr?`<div class="card" style="margin-bottom:14px">
        <div class="card-hd" style="margin-bottom:12px">
          <div class="card-t">${padZ(S.calDiaSel)}/${padZ(S.calMes+1)} — ${eventosdia.length} evento(s)</div>
          <button class="btn btn-acc btn-sm" onclick="modalNovoEvento('${diaSelStr}')">+</button>
        </div>
        ${eventosdia.length===0?`<div style="text-align:center;padding:20px;color:var(--txt3);font-size:13px">Nenhum evento neste dia</div>`:`<div class="hoje-resumo">${eventosdia.map(e=>rAgendaItem(e)).join('')}</div>`}
      </div>`:''}
      <div class="card">
        <div class="card-t" style="margin-bottom:12px">Próximos eventos</div>
        <div class="hoje-resumo">
          ${S.agenda.filter(e=>e.data>=hojeStr&&e.status==='agendado').slice(0,5).map(e=>`
            <div class="agenda-item" onclick="verEvento('${e.id}')">
              <div class="agenda-hora">${fmtH(e.hora_inicio)}<span>${fmtD(e.data)}</span></div>
              <div class="agenda-info"><div class="agenda-titulo">${e.titulo}</div>${e.pacientes?.nome?`<div class="agenda-pac">${e.pacientes.nome}</div>`:''}</div>
            </div>`).join('')||`<div style="text-align:center;padding:16px;color:var(--txt3);font-size:13px">Nenhum evento futuro</div>`}
        </div>
      </div>
    </div>
  </div>`;
}

  // Atualizar hash com aba atual
  if(S.pac?.id) history.replaceState(null,'','#paciente/'+S.pac.id+'/'+t);
}
function rTab(){switch(S.tab){case'timeline':return rTimeline();case'prontuario':return rProntuario();case'dados':return rDados();case'anamnese':return rAnam();case'pacote':return rPkTab();default:return'';}}

async function salvarEvolucao(id){
  var conteudo=(document.getElementById('ev-conteudo').value||'').trim();
  if(!conteudo){toast('Escreva a anotação','err');return;}
  var dados={
    data:document.getElementById('ev-data').value||new Date().toISOString().split('T')[0],
    tipo:(document.getElementById('ev-tipo').value||'Evolução').trim(),
    conteudo:conteudo,
    autor:(S.profAtual&&S.profAtual.nome)||S.config.nome_profissional||'Profissional'
  };
  try{
    if(id){
      dados.updated_at=new Date().toISOString();
      await q(function(){return sb.from('prontuario_evolucao').update(dados).eq('id',id);});
      toast('Anotação atualizada','ok');
    } else {
      dados.paciente_id=S.pac.id;
      await q(function(){return sb.from('prontuario_evolucao').insert(dados);});

    await loadEvolucao(S.pac.id);
    S.tab='prontuario';
    var el=document.getElementById('tc2'); if(el){el.innerHTML=rTab();bindTabEvts();}

}

  const pk=S.pac?.pacotes?.find(p=>p.status==='ativo');

  const sessComIA=all.filter(s=>s.avaliacao_ia?.resultado);
  const btnEvolucao=sessComIA.length>=2?`<div class="flex jb ai-c" style="margin-bottom:16px"><div></div><button class="btn btn-s btn-sm" onclick="gerarEvolucaoIA()">📊 Análise de Evolução</button></div>`:'';
  const grafico=rGraficoEvolucao();
  const por={'fase-1':[],'fase-2':[],'fase-3':[]};all.forEach(s=>{(por[s.fase_cicatrizacao]||por['fase-3']).push(s);});
  const labels={'fase-1':{cor:'var(--f1)',nm:'🔴 Fase Inflamatória',sub:'D0 — D5'},'fase-2':{cor:'var(--f2)',nm:'🟡 Fase Proliferativa',sub:'D6 — D21'},'fase-3':{cor:'var(--f3)',nm:'🟢 Fase de Remodelamento',sub:'D22+'}};
  let h=btnEvolucao+grafico+'<div class="timeline">';
  ['fase-1','fase-2','fase-3'].forEach(f=>{
    const its=por[f];if(!its.length)return;const lb=labels[f];
    h+=`<div class="tl-phase"><div class="tl-phase-dot" style="background:${lb.cor}"></div><span style="font-size:14px;font-weight:700;color:${lb.cor}">${lb.nm}</span><span style="font-size:12px;color:var(--txt3);margin-left:6px">${lb.sub}</span></div>`;
    its.forEach(s=>{
      const procs=Array.isArray(s.procedimentos)?s.procedimentos:JSON.parse(s.procedimentos||'[]');
      const fotos=s.fotos_sessao||[];
      h+=`<div class="tl-item" onclick="verSessao('${s.id}')"><div class="tl-dot tl-dot-${f.replace('fase-','f')}"></div><div class="tl-card"><div class="tl-card-hd"><div class="tl-card-t">Sessão ${s.numero_sessao}</div><div class="tl-card-d">${fmtD(s.data_sessao)}</div></div>${procs.length?`<div class="tl-procs">${procs.map(p=>`<span class="proc-tag">${p}</span>`).join('')}</div>`:''} ${s.notas?`<div style="font-size:12px;color:var(--txt2);line-height:1.5">${s.notas.substring(0,120)}${s.notas.length>120?'…':''}</div>`:''} ${fotos.length?`<div class="tl-photos">${fotos.map(f=>`<img class="tl-photo" src="${f.url}" loading="lazy">`).join('')}</div>`:''}</div></div>`;
    });
  });
  h+='</div>';return h;
}

function rAnam(){

  var comorbSalvas=(Array.isArray(a.comorbidades)?a.comorbidades:String(a.comorbidades||'').split(',')).map(function(x){return String(x).trim();}).filter(Boolean);
  var temOutro=comorbSalvas.some(function(x){return COMORBS.indexOf(x)<0;});
  var outroComorb=comorbSalvas.filter(function(x){return COMORBS.indexOf(x)<0;}).join(', ');

  function chk(nome,campo,checked){
    return '<label class="anam-check"><input type="checkbox" name="'+campo+'" value="'+nome+'" '+(checked?'checked':'')+'> '+nome+'</label>';
  }
  function radio(nome,campo,checked){

  }
  function dr(lbl,val,red){

  }

  var comorbHtml=COMORBS.map(function(c){return chk(c,'comorbidades',comorbSalvas.indexOf(c)>=0);}).join('')

  var anesHtml=ANES.map(function(t){return radio(t,'anestesia',a.anestesia===t);}).join('');

  return '<div class="card">'
    +'<div class="card-hd"><div class="card-t">Anamnese</div></div>'
    +'<div class="sec-sep">Cirurgia</div>'

    +'<div class="fg"><label class="fl">Tipo de Cirurgia</label><input class="fi" id="at" value="'+escH(a.tipo_cirurgia||'')+'"></div>'
    +'<div class="fg"><label class="fl">Data da Cirurgia</label><input class="fi" type="date" id="ad" value="'+(a.data_cirurgia||'')+'"></div>'
    +'</div>'
    +'<div class="fg2">'
    +'<div class="fg"><label class="fl">Cirurgiao</label><input class="fi" id="ac" value="'+escH(a.cirurgiao||'')+'"></div>'
    +'<div class="fg"><label class="fl">CRM</label><input class="fi" id="acrm" value="'+escH(a.cirurgiao_crm||'')+'"></div>'

    +'<div class="fg2">'

    +'<div class="fg"><label class="fl">Qual</label><input class="fi" id="acirprevdet" value="'+escH(a.cirurgia_previa||'')+'" placeholder="Descreva se houver"></div>'
    +'</div>'
    +'<div class="sec-sep">Saude Geral</div>'
    +'<div class="fg"><label class="fl">Comorbidades</label><div class="anam-checks" id="comorbidades-checks">'+comorbHtml+'</div></div>'
    +'<div class="fg2">'
    +'<div class="fg"><label class="fl">Medicamentos</label><textarea class="fta" id="ameds" style="min-height:64px">'+escH(a.medicamentos||'')+'</textarea></div>'
    +'<div class="fg"><label class="fl">Alergias</label><textarea class="fta" id="aalerg" style="min-height:64px">'+escH(a.alergias||'')+'</textarea></div>'
    +'</div>'
    +'<div class="fg2">'
    +'<div class="fg"><label class="fl">Peso (kg)</label><input class="fi" type="number" id="apeso" value="'+(a.peso||'')+'" placeholder="ex: 72"></div>'
    +'<div class="fg"><label class="fl">Altura (cm)</label><input class="fi" type="number" id="aaltura" value="'+(a.altura||'')+'" placeholder="ex: 165"></div>'
    +'</div>'
    +'<div class="sec-sep">Pos-Operatorio</div>'
    +'<div class="fg2">'
    +'<div class="fg"><label class="fl">Drenos / detalhes</label><input class="fi" id="adrenosdet" value="'+escH(a.drenos||'')+'" placeholder="ex: 2 drenos blake"></div>'

    +'</div>'
    +'<div class="fg"><label class="fl">Cinta compressiva</label>'

    +'<option value="nao"'+(a.cinta==='nao'?' selected':'')+'>Nao</option></select></div>'
    +'<div class="fg"><label class="fl">Historico Clinico</label><textarea class="fta" id="ah">'+escH(a.historico||'')+'</textarea></div>'
    +'<div class="fg"><label class="fl">Contraindicacoes</label><textarea class="fta" id="acx" style="min-height:64px">'+escH(a.contraindicacoes||'')+'</textarea></div>'

    +'<div class="flex gap8">'
    +'<button class="btn btn-p" id="bsa">Salvar Anamnese</button>'
    +'<button class="btn btn-s" onclick="S.editAnam=false;setTab(\'anamnese\')">Cancelar</button>'
    +'</div></div>';
}

async function exportarDados(){
  toast('Preparando backup...');
  try{
    var pacientes=await q(function(){return sb.from('pacientes').select('*,anamnese(*),pacotes(*,sessoes(*,fotos_sessao(*)))').eq('user_id',S.user.id);})||[];

    var backup={
      exportado_em:new Date().toISOString(),
      clinica:S.config.pdf_clinica||S.config.clinica||'Healtrack',
      total_pacientes:pacientes.length,
      pacientes:pacientes,
      agenda:agenda
    };
    var blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var aEl=document.createElement('a');
    aEl.href=url;
    aEl.download='healtrack_backup_'+new Date().toISOString().split('T')[0]+'.json';
    document.body.appendChild(aEl);aEl.click();document.body.removeChild(aEl);
    setTimeout(function(){URL.revokeObjectURL(url);},5000);
    toast('Backup baixado ('+pacientes.length+' pacientes)','ok');
  }catch(e){toast('Erro no backup: '+e.message,'err');}
}
