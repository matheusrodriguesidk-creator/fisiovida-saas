    <div class="flex gap8 ai-c" style="margin-bottom:18px"><span class="badge b-${fCls[fc]}">${fLabel[fc]||fc}</span><span style="font-size:13px;color:var(--txt3)">${fmtD(s.data_sessao)}</span></div>
    ${procs.length?`<div class="sec-t" style="margin-bottom:10px">Procedimentos</div><div class="tl-procs" style="margin-bottom:18px">${procs.map(p=>`<span class="proc-tag">${p}</span>`).join('')}</div>`:''}
    ${s.notas&&sensivelOk?`<div class="sec-t" style="margin-bottom:8px">Evolução</div><div style="font-size:14px;color:var(--txt2);line-height:1.65;white-space:pre-wrap;margin-bottom:18px">${s.notas}</div>`:''}
    ${s.avaliacao_ia?.resultado?(sensivelOk?`<div class="sec-t" style="margin-bottom:8px">✦ Avaliação de Cicatrização (IA)</div><div style="background:var(--primary-lt);border-radius:var(--r-sm);padding:14px;font-size:13px;line-height:1.65;color:var(--primary-dk);white-space:pre-wrap;margin-bottom:18px">${s.avaliacao_ia.resultado}</div>`:bloqueio):''}
    ${fotos.length?(sensivelOk?`<div class="sec-t" style="margin-bottom:10px">📸 Fotos</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px">${fotos.map(f=>`<img src="${f.url}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1.5px solid var(--border)" title="${f.referencia_escala||''}">`).join('')}</div>`:bloqueio):''}
    <div class="flex gap8 mt16">
      <button class="btn btn-s btn-sm" onclick="closeMo();editarSessao('${s.id}')">✏ Editar</button>
      <button class="btn btn-sm" style="background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;margin-left:auto" onclick="closeMo();excluirSessao('${s.id}')">🗑 Excluir</button>
    </div>
  </div>`);
}

// ── BINDINGS ──
function bindAll(){bindDash();bindAgendaEvts();bindSessEvts();bindCfgEvts();bindTabEvts();}

let _buscaTimer=null;
function bindDash(){
  var bnp=document.getElementById('bnp');
  if(bnp&&!bnp.dataset.bound){bnp.dataset.bound='1';bnp.addEventListener('click',function(){S.pac=null;modalNovoPac();});}
  var busca=document.getElementById('busca');
  if(busca&&!busca.dataset.bound){
    busca.dataset.bound='1';
    busca.addEventListener('input',function(e){
      clearTimeout(_buscaTimer);
      var val=e.target.value.toLowerCase();
      _buscaTimer=setTimeout(function(){
        var pg=document.getElementById('pg');if(!pg)return;
        var fs=val?S.pacientes.filter(function(p){
          var a=p.anamnese&&p.anamnese[0];
          return p.nome.toLowerCase().indexOf(val)>=0||((a&&a.tipo_cirurgia||'').toLowerCase().indexOf(val)>=0);
        }):S.pacientes;
        var lim=fs.slice(0,60);
        pg.innerHTML=lim.length?lim.map(rPacCard).join(''):'<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--txt3)">Nenhum paciente encontrado</div>';
      },250);
    });
  }
}

function bindAgendaEvts(){
  var b=document.getElementById('bne');
  if(b&&!b.dataset.bound){b.dataset.bound='1';b.addEventListener('click',function(){modalNovoEvento();});}
}
function navSemana(d,reset=false){
  S.semanaOffset=reset?0:S.semanaOffset+d;
  const el=document.getElementById('ag-content');
  if(el){el.innerHTML=rAgContent();bindAgendaEvts();}
}

function bindTabEvts(){
  document.getElementById('bsa')?.addEventListener('click',async()=>{
    // Coletar comorbidades incluindo "outro"
    const comorbChecks=Array.from(document.querySelectorAll('input[name="comorbidades"]:checked'))
      .map(el=>el.value).filter(v=>v!=='__outro__');
    const outroComorbTxt=(document.getElementById('comorbidades-outro-txt')?.value||'').trim();
    if(outroComorbTxt) outroComorbTxt.split(',').map(x=>x.trim()).filter(Boolean).forEach(x=>comorbChecks.push(x));
    const anestesia=document.querySelector('input[name="anestesia"]:checked')?.value||'';
    const dados={
      tipo_cirurgia:document.getElementById('at')?.value.trim()||null,
      data_cirurgia:document.getElementById('ad')?.value||null,
      cirurgiao:document.getElementById('ac')?.value.trim()||null,
      cirurgiao_crm:document.getElementById('acrm')?.value.trim()||null,
      anestesia,
      cirurgia_previa:document.getElementById('acirprevdet')?.value.trim()||null,
      comorbidades:comorbChecks.join(', ')||null,
      medicamentos:document.getElementById('ameds')?.value.trim()||null,
      alergias:document.getElementById('aalerg')?.value.trim()||null,
      peso:document.getElementById('apeso')?.value||null,
      altura:document.getElementById('aaltura')?.value||null,
      drenos:document.getElementById('adrenosdet')?.value.trim()||null,
      data_pontos:document.getElementById('apontos')?.value||null,
      cinta:document.getElementById('acinta')?.value||null,
      historico:document.getElementById('ah')?.value.trim()||null,
      contraindicacoes:document.getElementById('acx')?.value.trim()||null,
      expectativa:document.getElementById('aexp')?.value.trim()||null,
      observacoes:document.getElementById('ao')?.value.trim()||null,
    };
    try{await saveAnam(dados);S.editAnam=false;setTab('anamnese');}catch(e){toast('Erro: '+e.message,'err');}
    // Toggle "outro"
  });
  // Toggle "outro" em checkboxes de comorbidades
  document.querySelectorAll('input[name="comorbidades"]').forEach(el=>{
    if(el.value==='__outro__'){
      el.addEventListener('change',()=>{
        const w=document.getElementById('comorbidades-outro-wrap');
        if(w) w.classList.toggle('visible',el.checked);
      });
    }
  });
  document.getElementById('bnpk')?.addEventListener('click',modalNovoPk);
}

function bindSessEvts(){
  const fi=document.getElementById('finput'),fd=document.getElementById('fdrop');if(!fd)return;
  fd.addEventListener('click',()=>fi?.click());
  fi?.addEventListener('change',()=>{if(!fi.files.length)return;Array.from(fi.files).forEach(f=>S.fotos.push(f));rFotPrev();updIA();});
  fd.addEventListener('dragover',e=>{e.preventDefault();fd.classList.add('drag');});
  fd.addEventListener('dragleave',()=>fd.classList.remove('drag'));
  fd.addEventListener('drop',e=>{e.preventDefault();fd.classList.remove('drag');Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')).forEach(f=>S.fotos.push(f));rFotPrev();updIA();});
  document.getElementById('baia')?.addEventListener('click',async()=>{
    if(!S.fotos.length)return;const btn=document.getElementById('baia'),div=document.getElementById('aired');
    btn.disabled=true;btn.textContent='Analisando…';div.style.display='block';div.innerHTML='<div class="ai-loading"><div class="ai-spin"></div> Analisando cicatrização…</div>';
    try{
      const r=await avaliarIA(document.getElementById('snotas')?.value?.trim());
      S.iaResult=r;
      div.innerHTML=`<div class="ai-result">${mdHTML(r.resultado||r)}</div>`;
    }catch(e){div.innerHTML=`<div class="ai-result" style="color:rgba(255,120,120,.9)">Erro: ${e.message}</div>`;}
    btn.disabled=false;btn.textContent='Analisar Cicatrização';
  });
  document.getElementById('bss')?.addEventListener('click',async()=>{
    const data=document.getElementById('sdata')?.value;if(!data){toast('Informe a data','err');return;}
    const procs=Array.from(document.querySelectorAll('.proc-check input:checked'))
      .map(e=>e.value).filter(v=>v!=='__outro__');
    const outroProc=(document.getElementById('proc-outro-txt')?.value||'').trim();
    if(outroProc&&document.getElementById('proc-outro-check')?.checked) procs.push(outroProc);
    const notas=document.getElementById('snotas')?.value?.trim()||'';
    const ia=S.iaResult?{resultado:S.iaResult.resultado||S.iaResult,scores:S.iaResult.scores||null}:null;
    const btn=document.getElementById('bss');btn.textContent='Salvando…';btn.disabled=true;
    try{
      await saveSessao({data_sessao:data,procedimentos:procs,notas,avaliacao_ia:ia});
      S.iaResult=null;
      sessionStorage.removeItem('sessao_draft');
      await loadPac(S.pac.id);nav('paciente');
    }catch(e){toast('Erro: '+e.message,'err');btn.textContent='Salvar Sessão';btn.disabled=false;}
  });

  // Salvar rascunho no sessionStorage ao editar campos
  const saveDraft=()=>{
    try{
      sessionStorage.setItem('sessao_draft',JSON.stringify({
        data:document.getElementById('sdata')?.value||'',
        notas:document.getElementById('snotas')?.value||'',
        procs:Array.from(document.querySelectorAll('.proc-check input:checked')).map(e=>e.value),
        pacId:S.pac?.id||''
      }));
    }catch{}
  };
  document.getElementById('sdata')?.addEventListener('change',saveDraft);
  document.getElementById('snotas')?.addEventListener('input',saveDraft);
  document.querySelectorAll('.proc-check input').forEach(el=>el.addEventListener('change',saveDraft));
  // Toggle "outro" em procedimentos
  document.getElementById('proc-outro-check')?.addEventListener('change',e=>{
    const w=document.getElementById('proc-outro-wrap');
    if(w) w.classList.toggle('visible',e.target.checked);
  });
}

function bindCfgEvts(){
  document.getElementById('cpdfcor')?.addEventListener('input',e=>{const h=document.getElementById('cpdfcor-hex');if(h)h.value=e.target.value;});
  document.getElementById('cpdfcor-hex')?.addEventListener('input',e=>{if(/^#[0-9A-Fa-f]{6}$/.test(e.target.value)){const cp=document.getElementById('cpdfcor');if(cp)cp.value=e.target.value;}});
  document.getElementById('logo-input')?.addEventListener('change',e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();reader.onload=ev=>{S.config.pdf_logo=ev.target.result;const prev=document.getElementById('logo-prev');if(prev)prev.innerHTML=`<img src="${ev.target.result}">`;};
    reader.readAsDataURL(file);
  });
  document.getElementById('bscfg')?.addEventListener('click',async()=>{
    const dados={...S.config,nome_profissional:document.getElementById('cn').value.trim(),crefito:document.getElementById('cc').value.trim(),clinica:document.getElementById('ccl').value.trim(),telefone:document.getElementById('ct').value.trim(),endereco:document.getElementById('ce').value.trim(),claude_api_key:document.getElementById('capi').value.trim(),prompt_avaliacao:document.getElementById('cprompt').value.trim(),pdf_cor:document.getElementById('cpdfcor').value,pdf_clinica:document.getElementById('cpdfclinica').value.trim(),pdf_rodape:document.getElementById('cpdfrodape').value.trim(),
      pdf_opts:{
        pagina:document.getElementById('cpdf-pagina')?.value||'A4',
        margem_h:parseInt(document.getElementById('cpdf-mh')?.value)||40,
        margem_v:parseInt(document.getElementById('cpdf-mv')?.value)||40,
        fonte:parseInt(document.getElementById('cpdf-fonte')?.value)||11,
        qualidade:document.getElementById('cpdf-qualidade')?.value||'alta',
        incluir_fotos:document.getElementById('cpdf-fotos')?.checked!==false,
        incluir_ia:document.getElementById('cpdf-ia')?.checked!==false,
        incluir_grafico:document.getElementById('cpdf-grafico')?.checked!==false,
      }};
    try{await saveCfg(dados);render();}catch(e){toast('Erro: '+e.message,'err');}
  });
  document.getElementById('bnprof')?.addEventListener('click',()=>modalEditProf(null));
}

function modalEditProf(id){
  const prof=id?S.profissionais.find(p=>p.id===id):null;
  modal(`<div class="mo-box" style="max-width:480px">
    <div class="mo-hd"><div class="mo-t">${prof?'Editar':'Novo'} Profissional</div><button class="mo-cls" onclick="closeMo()">✕</button></div>
    <div class="fg2">
      <div class="fg" style="grid-column:1/-1"><label class="fl">Nome Completo *</label><input class="fi" id="pnome" value="${prof?.nome||''}"></div>
      <div class="fg"><label class="fl">CREFITO</label><input class="fi" id="pcref" value="${prof?.crefito||''}"></div>
      <div class="fg"><label class="fl">Nível</label>
        <select class="fsel" id="pnivel">
          <option value="admin" ${prof?.nivel==='admin'?'selected':''}>Administrador</option>
          <option value="profissional" ${(!prof||prof?.nivel==='profissional')?'selected':''}>Fisioterapeuta</option>
          <option value="auxiliar" ${prof?.nivel==='auxiliar'?'selected':''}>Auxiliar</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px">
        <input type="checkbox" id="pacsens" style="accent-color:var(--primary)" ${prof?.acesso_sensivel!==false?'checked':''}> Acesso a dados sensíveis (fotos, avaliações IA)
      </label>
    </div>
    <div class="fg">
      <label class="fl">PIN de 4 dígitos (deixe vazio para sem PIN)</label>
      <input class="fi" type="password" id="ppin" placeholder="••••" maxlength="4" style="max-width:120px">
      ${prof?.pin_hash?`<div class="cfg-hint">PIN já configurado. Deixe vazio para manter ou preencha para alterar.</div>`:''}
    </div>
    <div class="flex gap8 mt8">
      <button class="btn btn-p" id="bsprof" style="flex:1;justify-content:center">${prof?'Salvar':'Adicionar'}</button>
      ${prof?`<button class="btn btn-g" style="color:#DC2626" onclick="closeMo();deleteProfissional('${prof.id}').then(()=>render())">Remover</button>`:''}
      <button class="btn btn-s" onclick="closeMo()">Cancelar</button>
    </div>
  </div>`);

  document.getElementById('bsprof').addEventListener('click',async()=>{
    const nome=document.getElementById('pnome')?.value.trim();
    if(!nome){toast('Nome obrigatorio','err');return;}
    const pinVal=document.getElementById('ppin')?.value.trim()||'';
    let pinHash=prof?.pin_hash||null;
    if(pinVal){
      if(pinVal.length!==4||!/^\d{4}$/.test(pinVal)){toast('PIN deve ter exatamente 4 digitos numericos','err');return;}
      pinHash=await hashPIN(pinVal);
    }
    const nivel=document.getElementById('pnivel')?.value||'profissional';
    const acessoSens=document.getElementById('pacsens')?.checked!==false;
    const dados={
      nome,
      crefito:document.getElementById('pcref')?.value.trim()||null,
      nivel,
      acesso_sensivel:acessoSens,
      pin_hash:pinHash
    };
    if(prof?.id) dados.id=prof.id; // so inclui id se editando
    try{
      await saveProfissional(dados);
      toast(prof?'Profissional atualizado':'Profissional adicionado','ok');
      closeMo();
      await loadProfissionais();
      if(!S.profAtual) S.profAtual=ownerProf();
      render();
    }catch(e){toast('Erro ao salvar: '+e.message,'err');}
  });
}

function rFotPrev(){
  const el=document.getElementById('fprev');if(!el)return;
  el.innerHTML=S.fotos.map((f,i)=>`
    <div class="ph-prev" style="position:relative">
      <img src="${URL.createObjectURL(f)}">
      <button class="ph-rm" onclick="rmFoto(${i})">✕</button>
      <input type="text" placeholder="Região (ex: abdômen)" value="${S.fotosRegioes?.[i]||''}"
        style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;border:none;padding:3px 6px;font-size:10px;border-radius:0 0 var(--r-sm) var(--r-sm);font-family:'DM Sans',sans-serif"
        oninput="if(!S.fotosRegioes)S.fotosRegioes=[];S.fotosRegioes[${i}]=this.value">
    </div>`).join('');
}
function rmFoto(i){S.fotos.splice(i,1);rFotPrev();updIA();}
function updIA(){const b=document.getElementById('baia');if(b)b.disabled=!S.fotos.length;}

function navMes(d){S.calMes+=d;if(S.calMes<0){S.calMes=11;S.calAno--;}if(S.calMes>11){S.calMes=0;S.calAno++;}S.calDiaSel=null;const el=document.getElementById('mc');if(el)el.innerHTML=rView();bindAll();}
function selDia(d){S.calDiaSel=S.calDiaSel===d?null:d;const el=document.getElementById('mc');if(el)el.innerHTML=rView();bindAll();}

async function navDash(){
  closeSb();
  try{
    await loadPacs();
    await loadAgenda();
  }catch(e){ console.error('navDash load erro',e); }
  nav('dashboard');
}
async function goD(){ await navDash(); }
async function goPacientes(){
  closeSb();
  try{ await loadPacs(); }catch(e){ console.error('goPacientes',e); }
  nav('pacientes');
}
function rPacientes(){
  var pacs=S.pacientes||[];
  var lista = pacs.length===0
    ? '<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--txt3)"><div style="font-size:48px;margin-bottom:12px">🌿</div><div style="font-size:16px;font-weight:600;color:var(--txt2)">Nenhum paciente ainda</div><div style="font-size:13px;margin-top:4px">Toque em &quot;+ Paciente&quot; para cadastrar o primeiro</div></div>'
    : pacs.slice(0,60).map(rPacCard).join('');
  return '<div class="ph">'
    +'<div><h1 class="ph-title">Pacientes</h1><p class="ph-sub">'+pacs.length+' cadastrado(s)</p></div>'

    +'</div>'
    +'<div class="pc">'
    +'<div class="search-bar"><span class="search-ic">&#9906;</span><input type="text" id="busca" placeholder="Buscar por nome ou cirurgia..."></div>'
    +'<div class="pg" id="pg">'+lista+'</div>'
    +(pacs.length>60?'<div style="text-align:center;padding:16px;color:var(--txt3);font-size:13px">Mostrando 60 de '+pacs.length+'. Use a busca.</div>':'')

}
async function openPac(id){await loadPac(id);S.tab='timeline';S.editAnam=false;nav('paciente');}


function toggleSb(){
  var sb=document.querySelector('.sidebar');if(sb)sb.classList.toggle('open');
  var ov=document.getElementById('sb-overlay');if(ov)ov.classList.toggle('open');
}
function closeSb(){
  var sb=document.querySelector('.sidebar');if(sb)sb.classList.remove('open');
  var ov=document.getElementById('sb-overlay');if(ov)ov.classList.remove('open');
}
window.onerror=function(msg,src,line,col,err){
  var app=document.getElementById('app');
  if(app&&!app.dataset.booted){
    app.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F2F4F7;padding:20px;font-family:sans-serif">'
      +'<div style="background:#fff;border-radius:14px;padding:28px;max-width:440px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.1)">'
      +'<div style="font-size:30px;margin-bottom:10px">&#9888;&#65039;</div>'
      +'<div style="font-size:17px;font-weight:700;color:#1A1D2E;margin-bottom:8px">Erro ao carregar</div>'
      +'<div style="font-size:12px;color:#DC2626;background:#FEF2F2;border-radius:8px;padding:10px;margin-bottom:10px;word-break:break-word">'+(msg||'?')+'</div>'
      +'<div style="font-size:11px;color:#9AA5B4">linha '+(line||'?')+'</div>'
      +'<button onclick="location.reload()" style="margin-top:14px;padding:10px;background:#4fa0d4;color:#fff;border:none;border-radius:8px;font-size:14px;width:100%;cursor:pointer">Recarregar</button>'
      +'</div></div>';
  }
  console.error('Healtrack Error:',msg,'at',src+':'+line+':'+col,err);
  return false;
};

// Capturar promises rejeitadas (erros async que window.onerror nao pega)
window.addEventListener('unhandledrejection',function(ev){
  console.error('Unhandled rejection:',ev.reason);
  var app=document.getElementById('app');
  if(app&&!app.dataset.booted){
    var msg=(ev.reason&&ev.reason.message)?ev.reason.message:String(ev.reason);
    app.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F2F4F7;padding:20px;font-family:sans-serif"><div style="background:#fff;border-radius:14px;padding:28px;max-width:440px;width:100%"><div style="font-size:30px;margin-bottom:10px">&#9888;&#65039;</div><div style="font-size:17px;font-weight:700;margin-bottom:8px">Erro ao iniciar</div><div style="font-size:12px;color:#DC2626;background:#FEF2F2;border-radius:8px;padding:10px;margin-bottom:10px;word-break:break-word">'+msg+'</div><button onclick="location.reload()" style="padding:10px;background:#4fa0d4;color:#fff;border:none;border-radius:8px;width:100%;cursor:pointer">Recarregar</button></div></div>';
  }
});

// Desregistrar qualquer Service Worker antigo e limpar caches (corrige app preso em cache)
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(reg){reg.unregister();});
  }).catch(function(){});
  if(window.caches&&caches.keys){
    caches.keys().then(function(keys){keys.forEach(function(k){caches.delete(k);});}).catch(function(){});
  }
}
boot();
</script>
